body:
  text: 卷上第一章外瘍總論第一節論陰證陽證瘍科辨證首重陰陽然陰陽二字所包者廣不僅以熱證為陽寒證為陰紅腫焮起為陽平塌堅硬為陰也王洪緒外科證治全生集儼儼然以癰疽二字判分陰陽謂高突紅腫者為癰為陽證堅塊不紅者為疽為陰證世之治外科者多宗之雖曰藉此字面以示區別尚無不可然顧其名必思其義一字之確詁必須切合訓詁本旨而後名正言順可為後學法守其亦知癰疽二字之本義乎癰者壅也疽者沮也阻也皆為氣血壅閉遏止不行之意本是外瘍籠統之名詞無所軒輕於其間何嘗有一陰一陽之辨別豈可自我作古強為分析而謂古人制字當如吾意獨具見解此土豪劣紳武斷鄉曲之故智大不可也醫宗金鑑外科心法不問陰陽統稱癰疽最是通論凡古書之外瘍名詞或稱某癰或稱某疽皆當認為籠統之辭斷不可誤信王氏之説而執癰疽二字妄為分別惟陰陽二證雖無代表之字面而未嘗無界限之可言但取義亦非一端必須融會貫通悟徹至理而後見微知著直決無疑有可以經絡之部位分陰陽者如頭面為陽背後為陰股外為陽股內為陰之類是也有可以人體之向背分陰陽者如面前及腦腹之部多陽證腦後及腰背之部多陰證是也古者聖人南面而立向陽而治故面前屬於陽背後屬於陰確有至理有可以病因之寒熱虛實分陰陽者如熱病皆陽證寒病皆陰證實病多陽證虛病多陰證是也有可以病勢之遲速分陰陽者其來也疾三日五日而其形已巨者皆陽證其來也緩旬日匝月而無甚變遷者多陰證是也有可以病形之淺深分陽陰者發於膚表之間不著筋骨而肢體之運動自如者皆陽證發於肌肉之理推筋著骨而身軀之動作不便者皆陰證是也有可以腫勢之堅軟分陰陽者如其腫堅凝按之如石者多陰證其腫雖巨按之軟和者多陽證是也有可以痛勢之緩急分陰陽者如暴戾迅速掣痛猛烈者多陽證頑木不仁痛反和緩或但覺酸楚牽強意不作痛者多陰證是也乃或者必以焮赤高腫為陽漫腫不紅為陰但就表面言之似亦未嘗不確不知瘍患皮膚殷紅者其病最淺僅在腠理之間所以膚表易於變色如暑月熱癤痱疹癬疥之類皆非外瘍重要之病或則肌肉柔軟之部如臑內腋下股陰膕中諸處乃其人之骨小肉脆肌膚柔白者生瘍往往發紅此則陽證雖多紅腫之候究之紅腫一端未可定為陽證之代表且亦有明是陰證而皮膚必發紅腫者如腦疽背疽病在太陽寒水之經脈多細小舌必白膩均是陰證之確候而外形亦或高突發紅則以此病初起必先發見黍米一粒頭白根堅病即在於肌膚之間故能皮膚變色此紅腫不足以概陽證之確據也若夫瘍發於肌肉之裡去皮毛尚遠則內縱成膿而膚表必不改色或肩背肌膚緻密之處及其人之色蒼皮老者發瘍雖淺色亦不變又何得因其不紅而概謂之為陰證要之見證論證分別陰陽務必審察其人之氣體虛實及病源淺深而始有定論望色辨脈兼驗舌苔能從大處著想則為陰為陽屬虛屬實辨之甚易若僅以所患之地位為據已非通人之論而顧拘拘於方寸間之形色亦只見其目光之短淺究竟於病情病理兩無當也第二節論腫外瘍形勢皮相者恆以發腫之大小緩急辨別輕重而已然其實不可以外形論也要在視其病源之淺深緩急及部位之虛實險夷為主義故有發腫甚巨其勢可畏而治療得宜功成反掌者亦有堅塊尚小貌若易療而費盡手續始終不應者此非醫家之技術有良莠誠以受病之源萬有不齊切不可以一例觀也若但以外形論之大率腫在皮膚之表肌肉之中雖有大瘍尚多易治若在筋骨之間大節之界起病雖微亦多難療凡外瘍之淺者腫必高突而根圍收束不甚平塌者最是佳象若散漫不聚毫無畔岸者則多棘手而其深者初發時但痠痛不仁甚者且微酸而不痛然皮肉如故無所謂腫硬堅塊也至數日而重按之始覺其中有僵硬之處然後漸以延開其勢日巨而尚無高突形象其皮膚之色澤如故其膚表之肌肉亦如故此附骨大疽發腫之次序病家恆不自知為瘍證者也若以腫勢之已發現者言之則堅腫而四圍分明者其證順堅硬而畔岸散漫者其證重非毒勢之不聚即元氣之不充也若堅腫大痛按之四圍皆硬而其中有一點獨軟者則內已成膿矣亦有軟腫散漫杳無邊際其人但苦其重而不作痛則氣血大衰斷非佳狀此證甚有成膿而始終不痛者蓋其人正不勝邪神經之知覺不靈邪正已不能相爭所以毫不知痛最為敗象又有病起皮膚間一粒如黍上有白頭吾吳俗語謂之毒㾦子其形如暑天痱㾦之狀故而皮膚肌肉絲毫不變無所謂腫也然黍粒雖小而或癢或痛或且頑木如失知覺經脈不利牽強不仁則必為外瘍大證延至三日五日而根圍漸大腫堅且深其後腐化必不甚小此腦疽背疽腹皮癰及疔毒等諸大瘍之腫勢也若頭面額顱頤頰口唇間見此黍粒而或為麻木或為癢痛者則尤為疔毒之重候初起亦不腫至其漸形腫硬而大波軒然作矣若頭面漫腫無此黍粒其腫或堅或軟或亦作痛作癢頃刻而起其勢甚速或有寒熱或無寒熱則大頭疫也此證病家必以為外瘍而瘍科或且不識妄用刀針敷藥誤人最多實則風邪襲六陽之絡疏表立驗古所謂頭面腫為風者此病是也又古有腳腫為濕之語亦是確論但辨其寒濕與濕熱而已如其紅腫光亮皆屬濕火若但腫而不紅則濕盛也果屬寒濕腫必不堅脈必遲澀舌必白膩古人之治腳氣恆用溫燥皆專為寒濕立法然大江以南濕與熱並凡腫處堅硬者其濕最易化熱非可與古書作一例論矣腫瘍大旨不過如斯若至潰後則膿毒必求其爽利自然腫處漸消庶為順境膿不爽則腫不能退若膿已暢達而腫猶堅硬則膿水濃厚者為毒未淨為實證膿水清徹者為正不足為虛證辨別治之無餘蘊也第三節論痛外瘍之患最普通者惟腫與痛二者而已顧腫之形勢即各不同而痛之源流亦非一致故泛言之則外瘍之發無非氣血之壅滯古人所謂痛則不通通則不痛其大要也而細辨之則種種色色各有原由故有先腫而後痛者有先痛而後腫者有但痛而不腫者有但腫而不痛者有腫漸堅巨而漸覺痛者有腫常綿軟而不甚痛者有內欲釀膿而始作痛者有內已成膿而竟不痛者有痛發數處同時並作者有走痛無定莫可指認者有痛在肌肉之間者有痛在筋骨之裡者有痛勢大劇片刻不休者有痛勢和緩時而間甚者有隱隱作痛手掌撫摩而自覺愈快者有頻頻作痛手指按之而竟如刀刺者有腫已蔓延甚巨而其痛僅在一處者有腫漸散漫廣闊而腫處無不大痛者有形塊日久不甚高突而堅硬不移按之痠痛尚不大痛者有堅塊既久初不膨脹而忽然焮發有時抽掣痛如雀啄者有腫勢四散而痛反不盛者有腫勢收束而痛遂大劇者有潰後膿毒既泄而痛即緩者有潰後膿流不暢而痛不減者有腐肉未脫而痛不休者有膿血太多而痛轉盛者有腐爛甚巨而始終不大痛者有腐爛漸久而先痛忽不痛者情狀固萬有不齊證勢即因之大異或為順或為逆或則漸臻佳境或則陷入危途或貌視之雖屬可危而其實易療或觀其狀似無大害而其實難瘳所以有痛勢大熾而應手成功者亦有痛勢和平而卒歸不治者蓋病源有深淺形證有險夷或病本劇也而治之如法尚可轉敗為功或病似輕也而根蒂已深究竟百無一效苟非識之既確辨之能詳所見既多閲歷有素奚以見微知著洞察源流而先事預防當機立斷乎試就腫痛之各有不同者而分析言之要皆有理可求有源可溯非臆説也凡先腫後痛者其病淺外瘍之常態而亦外瘍之輕恙也先痛而後腫者其病深非附骨著節之大證穿骨穿踝骨槽如附骨疽環跳疽皆是即流痰流注內癰之屬也癰肚癰腸癰等皆是如腰疽肋疽腎俞疽但痛而不腫者經絡閃傷之病或風寒濕三氣之痹也但腫而不痛者上為風邪疫是如大頭下為濕邪氣是如腳及贅瘤也腫漸堅巨而漸痛者內膿已成難期全散也腫常綿軟而不甚痛者氣血必衰真元敗壞也內欲釀膿而漸作痛者瘍之正肉腐成膿理無不痛也內已成膿而竟不痛者瘍之變神經已死多難挽救也痛發數處同時並起或先後相繼更迭遞傳者時邪之流注也痛常走竄忽彼忽此或竟無定處莫能指認者風勝之行痹也痛在肌肉之間者其病必淺雖有大證當無大變痛在筋骨之裡者其患已深治之不早必多幻象痛勢大劇片刻不休其膿已成也痛勢和緩有時間甚膿猶未聚也其隱隱作痛而喜撫摩者病雖未劇膿雖未成然病發於陰深藏不露斷非輕恙不可忽視其頻頻作痛無時或休而不可手按者內已成膿是宜針之使潰也凡腫勢漫延而痛在一處者膿毒有定其形雖巨可以冀其聚而不散若腫勢散漫而無處不痛者毒邪四散其勢方張苟非治療得宜鮮不毒延四竄矣形塊日久不甚高突堅硬不移酸而不痛者瘰癧結痰痞積之流蒂固根深非可猝拔若堅塊既久初不焮發而忽然膨脹時覺掣痛者乳岩石疽失榮之證郁之日深勢且迸裂矣若腫勢漫散而痛反不甚者毒已旁流由夷入險如疔毒之走黃如腦背疽之內陷覺痛則吉不痛則凶此性命呼吸之機也而昧者反以不痛為苟安則謬矣腫勢既束而痛反劇者毒已成熟由深而淺此內膿已聚之徵也而俗人或以大痛為可駭則惑矣潰後膿泄而痛隨緩者瘍之常毒已達勢已衰浪靜波平安瀾之朕兆也潰後膿泄而痛不減者瘍之變非手術不精膿流不暢即餘毒尚熾死灰復燃也潰後毒未盡而痛不衰者惡毒不脫新肌不生毒重者化毒為先正衰者補正宜亟潰後膿過多而痛轉盛者攻孔既巨調復需時餘毒未消則宜清理正氣若餒端賴扶持矣腐爛既巨而始終不甚痛者惟濕瘍為然皮膚之病濕重熱輕如臁瘡之類有之則宜清燥而腦背疽之元氣式微者亦間有之則非溫補托毒鮮不敗矣腐爛漸大而先痛後不痛者如其調治得宜惡腐漸淨是邪之退正之充庶幾順境抑或腐未去新未生而忽然頑木痛癢不知則為內陷危殆近矣要而言之腫瘍有形以知痛為順痛者其證猶輕必多易治如其日久如故竟不作痛雖若相安無事而盤踞要害痼疾難療乳岩石疽癧瘍之屬其尤厲者而附骨流痰之倫其始皆不甚痛者也潰瘍以毒去痛衰為吉痛漸減則病漸瘥若既潰而痛仍熾非治療之不當即手術之粗疏或外治之藥不合機宜此皆醫師之不良有以貽害而自然之壞證尚是無多操司命之權者尚其明辨篤行而弗致遺人夭殃絶人長命則庶幾矣第四節論癢外瘍發癢其最普通者皮膚病為獨多如疥癬遊風濕注濕臁黃水瘡血風瘡等其最著者而溯其原因則不外乎風燥與濕熱二者而已風性善行襲入肌膚則走竄四注故恆遍體癢搔淫淫然如蟲蝨之遊行於肌表惟風勝則燥雖搔破血溢而隨破隨收不致化腐此風淫為病凡乾疥風癬癮疹丹痧之類皆癢甚而必不腐爛者是也又有齡痧疹冒風恆發痧瘡蘭溪土語謂之麻風疥痧瘡二字乃吾吳俗之通稱頻年纍月不易速愈此癢之屬於風燥者一也若濕鬱生熱流溢肌表則血濁不清濕邪留而不去積濕生熱蘊熱生蟲其癢尤烈而浸淫四竄黃水頻流最易蝕腐且多傳染此濕淫為病凡遊風臁瘡黃水膿窠諸瘡且癢且腐愈腐而愈癢此癢之屬於濕熱者又其一也若腫瘍則恆無發癢之例即偶有之在上部者必兼風化在下部者必兼濕化帷疔瘡大腫之時毒勢未達膿猶未成頗有肌里作癢淫溢四散者此則疔毒之走散最為危候苟非收束其根圍透達其膿毒惟恐毒陷內攻為禍甚速是發癢之最忌者而腦背疽之漫腫無垠膿不暢達有時發癢者為害亦同也若潰瘍流膿已暢而四圍余腫未消亦有時微微作癢此腫勢漸化氣血流通之朕兆是為佳象亦有腐肉已脫新肌盎然皮肉間時作微癢亦是除舊布新氣血貫注之故但必以輕微淡遠隱隱流布方是漸入佳境抑或既潰之餘始尚相安而忽爾奇癢難忍則非外風之侵襲即是濕熱之鬱蒸腫勢必隨之而更盛是又當見景生情隨機應變必不可固執一見謂潰瘍之發癢定當作欲愈觀也第五節論酸楚不痛外瘍之初有但覺酸楚而不痛者大率皆勞力傷經及寒邪深入或體質薄弱血氣俱衰或驟喪真元房幃不謹陰虛受寒皆陰證也皆大證之發於骨節或且傷及內藏者也勞力傷經者任重致遠筋力既疲因而氣滯血凝停頓不前其患多發於手足大節如肩髃肘腕膝膕環跳跨陰等部其始則經脈不舒或酸或掣治之於早活血通絡應手成功或更循其經脈針刺以流通之為效尤捷逮遷延日久酸者作痛腫勢有加而為害巨矣手腕足踝環跳諸部之瘍酸楚尤甚且有腫形已巨而仍大酸不痛者此則患在兩骨相連之間更為難治外感寒邪病在經脈循經入絡附著筋骨寒凝不化氣血不流亦為經脈牽掣骨節酸楚因是寒邪故雖或肉裡堅硬明已有形而亦多酸少痛若郁久化熱則痛多而焮發矣體弱者真陰忒微陽氣亦餒臟腑之蓋既營衛之布難周或為腰疽或為腎俞或為虛損流痰雖已有形而多不痛此無他正不勝邪無相爭之力耳蓋瘍之為痛皆正氣與邪氣搏戰之故若正氣既不能敵則逆來順受痛於何有凡骨小肉脆者多有此證治之及早能投滋補或有一線之生機否則怯瘵之始基瘡癆之正軌也甚且有外證未潰而大命先傾者復何論其潰後之成績耶不僅者閨房戕賊欲後感寒腎陰之根本久虛肌表之衛陽必弱況當百脈僨張之會氣血奔馳之時腠理皆疏感受外寒更是易易而直入經絡深及骨髓或為腰膝痠軟痿弱不仁或為環跳股陰經制牽強馴致經絡短縮漫腫堅凝而皆酸楚者多劇痛者少亦是正不敵邪無力爭勝之候凡附骨環跳鶴膝腰髀等證酸在骨節間者苟非其先天之不足即皆由房室之耗傷也如其人體質猶強而及早治療則溫經宣絡合以滋養亦多有效若素稟不堅而復遷延漸久邪勢既張正氣更憊則必不治凡此皆瘍患之多酸少痛者總之皆是重證往往病者初不介意不早調治而淺者視之又復不能洞燭病情遷延坐誤即其後再遇明者亦終無法外之法挽此沉疴殊可慨也第六節論頑木不痛癰疽為患痛者其常不痛者其偶如皮膚之病暑熱之瘍間有不痛者則本非大證無害其不作痛也若夫腫勢猖狂非不堅巨而反覺頑木不仁不痛不癢則苟非大毒可以劫制神經使失知覺何以致此所以頑腫木腫之證其為害必較之大痛者倍而有餘如疔瘡之猛厲者始發黍米之粒而堅腫隨之頃刻四溢患者但覺肌膚之呆滯不靈而無所謂痛也此帷頭面額顱耳前唇頜諸疔有之遷延不治曾不崇朝而毒已內攻胸滿噁心神思昏憒若非急急大劑清解勢多不救此頑木不痛之屬於急證者一也又有頑痼之病初發堅塊附筋著骨並不痛癢為日雖多而形勢如故其在外之肌肉皮色亦如故甚至有經年纍月而不改其常者在病者且毫不介意以為相安已久不復為患然偶有感觸而形塊乃巨於是有始作一抽之痛者則大證已成變動乃速此惟石疽乳岩有此奇變而證已不可為矣此頑木不痛之屬於緩證者又其一也此外有皮膚之瘍腐潰日久時而稍稍收斂時而漸漸化開反復頻仍幾更寒暑流水不徹痛癢俱忘此則久爛之餘其肌肉之神經已死而皮膚之顏色黯然津液乾枯有如稿木則亦頑梗無知搔爬不覺雖似習慣自然不為大患然而脂膏已耗痊愈無期此惟久潰瘡瘍失於調治致成壞證在貧勞勞力之人往往有之又梅瘡結毒治不得法亦必如此此皆久腐之餘調理失宜遷延歲月氣血不流每令四圍未腐肌膚漸為頑木則其後雖或治之合宜幸得收斂而其肌肉亦必痛癢不關如非己有抑且皮色斑駁按之木強此即局部神經失其功用不能恢復使然要皆久敗之瘡瘍非尋常之軌範已第七節論腫瘍辨膿之法腫瘍當成潰之期肌腠之內必先蒸釀成膿其發之最淺者形塊高聳根圍收束不問其膚色之紅與不紅可一望而知其已成以針決之膿泄病去不三五日而收全功此有膿無膿之最易辨者然皆極小極輕之恙如暑月之熱癤等縱不醫藥亦必自愈不可以癰疽論也瘍之巨者其發必深漫腫無垠必不高聳必不變色內雖有膿而尚在肌肉之底如腫勢胖大若肥人體豐及股臀肉厚之部位往往膿成於一二寸之裡而皮里之肌肉仍如故昧者不察謬以為猶可消散則內膿愈攻愈巨外不達而內潰日深釀成壞證以致不可收拾者所見甚多皆不能早知其有膿而貽禍無窮殊堪浩嘆辨之之法漫腫不束按之皆堅痛勢未甚者膿未成也若按之已痛而以指端重按一處其痛最盛者其中必已成膿但深在肉裡未便即動刀針多血多痛在膏粱之體柔弱之人亦且望而生畏則外必以圍藥束其四周而內服透達之劑提膿外達一二日而其腫較高其膿較淺再按之而指下已軟可以奏刀矣若漫腫堅巨以指端按之四圍堅硬而中有軟陷者膿成而尚在淺處者也或腫勢散開延及盈尺按之皆堅而以兩指距離一二寸彼此迭按堅腫之下隱隱軟陷者亦深處之已成膿者也若至漫腫焮起皮膚繃急甚至光亮則不必手按而已知其皮內皆軟膿必盈盆矣此腫瘍辨膿已成未成之大法據頤三十年閲歷大旨不過如斯而俗傳諸書謂指按而深凹者無膿指按而即起者有膿然指按腫處能有凹形者惟氣虛發腫為然必非外瘍外瘍之腫堅硬者多按之必無凹形若按之隨指陷下而放手即起則惟內有多膿攻孔極巨而又極淺者為然即上所謂皮膚光亮一望可知者又何取手指下之辨別若內有大膿而外面未腐之皮肉尚有三五分厚者則必按之不陷亦不隨手而起何可概以為膿必未成有謂按之皮膚熱者為有膿皮膚不熱者為無膿然肌膚之小癤其發淺雖未成膿而膚亦熱肉裡之大癰其發深雖已有膿而膚必不熱且有謂漫腫無垠以濕紙貼之有一處先干則其處有膿者皆是癡人説夢並未親自經驗而妄作理想之欺人語壽頤按為此説者其意蓋謂內已成膿皮膚必熱故濕紙當先干究竟膿之成不成全不關係於皮之熱不熱直是生平未嘗見過瘍病最是可笑惟勞力之人指節生瘍其皮堅老而厚肉又極少發腫之時是否膿成最難辨認其腫勢未巨而亦不甚高突者則必以指尖細按果有一點已軟即為成膿之證又有腹部空軟之地內發腸癰腫必不高形亦不巨內雖成膿而指下殊難分辨若重按之則腹部本軟隨手下陷是其常態然即有堅塊果能以指尖於成塊處細細體會自能得心應手此必臨證漸多閲歷有得方能洞見隔垣初非率爾操觚心粗氣浮者所能倉卒論斷但腹內生癰辨膿雖難而尤不可不辨之於早蓋瘍生臂臑臀腿等處堅實部位膿成三五日而不能早決不過內攻漸巨痛苦較多尚未必定有奇變惟此空虛之地果已成膿而不能早泄其毒勢必內潰日甚不幸而穿腸或破內膜即為壞證醫者之決斷少遲即病人性命出入之界胡可不慎之又慎明辨秋毫總之胸腹脅肋腋下腰間背部等之癰疽苟已有膿則早一日泄毒即少一步內攻若不能決之於先以致穿膜入內卒於不治者無一非醫家耽誤之咎一念及此而始知最難辨別之病即最易殺人之機是不可畏其難而置之不問者也又有背疽腦疽腹皮癰三大證初起皮膚一粒漸以根圍堅腫而腫處發現幾點白腐其膿自外釀成與他證之膿成皮里者顯然不同此則內以托毒外出為主而外敷提膿拔毒非精良之藥不為功苟得膿毒透達即可十全無憾又頭面之疔毒亦間有先起一點白粒膿成自外者則外治之藥與腦背疽同而內服宜重用清解只求疔頭腐肉化膿脫落而大功告成腹皮癰之治法與疔瘡同亦以清解為主與腦背疽之宜用溫經托毒法者大異此又同是成膿而來源去委之別開生面者矣第八節論膿之色澤形質瘍患成膿汙穢之質惡臭之氣好潔者望望然去之惟恐或浼似不必形諸楮墨辨其色相矣雖然察色辨證四診之要惟膿與水皆血肉所蘊釀可以驗體質之盛衰決病情之夷險閲歷有得一望可知又安能置之弗談顢頇從事故以膿之形質言之則宜稠不宜清稠厚者其人之元氣必充淡薄者其人之本真必弱惟膿成於內日久不泄攻孔深巨蘊釀多時則其質多不稠厚決而去之如水直流色澤不晦氣臭不惡尚是正宗未為敗象其孔深膿多者中必間以腐肉纍纍如豬脂之筋膜如腐渣之成團則即其肌肉間之血絡筋膜腐化不盡隨流而去也凡大證潰決之後二三日間必常流清淡之膿甚者亦間有腐肉自出如腐肉形巨塞住決口則膿水不暢而腫不消痛不減必當設法鉗出其膿自暢更三四日膿盡而滋水自流則四圍堅腫隨以漸消再閲數日而水亦盡潰口又見稠膿則腫勢全消內孔已滿新肌已充而全功就緒矣此為調治得法之順證言之攻孔雖巨成膿雖多決潰之餘痛除毒泄胃旺能食者往往不旬日而收全績其經旬纍日而不愈者多是失治之壞證未必皆其證之不易治也如其乍潰之時膿本無多而竟清徹如水或濁膩晦黯如黑豆汁如汙泥漿則必氣血久衰正氣不敵無力化膿參之其人形色無不形容枯稿色脫肉消脈細而微如其胃氣尚佳可投滋補或能冀其轉敗為功抑或有邪未清或胃納亦憊礙難補益則雖有盧扁亦難挽回元氣於無何有之鄉矣以膿之色澤言之宜明淨不宜汙濁色白質稠而清華朗潤者正氣之充最是佳境黃濁稠厚而色澤鮮明者氣火有餘宜投清理即或膿質不稠色白或黃純淨瑩潔者亦必順證若膿色如青如緑稀薄不濃者則蘊之多日蒸釀而質薄者也其有膿中兼以瘀血色紫成塊則血絡亦腐血自絡出積而成瘀也有膿中雜見鮮血者即絡中之血與膿俱泄也若膿血不分形色不純者已有正虛邪盛之慮若膿血不稠色雜不一或淡白如粉漿或汙濁如穢水則正氣不充不能托毒透泄之象日久遷延多有變幻而甚者則紫黯晦滯如降香之磨汁雜以汙泥如腐敗之豬肝捶為爛醬或且氣則腥穢惡臭色則黑白難名如井底之淤泥如溝中之積汙是膿是血是水是漿不可方物者則正氣不存血肉之質已為異物皆不治之證也第九節論潰瘍之水潰瘍流水凡皮膚之病皆濕盛也如疥瘡天泡瘡黃水瘡之屬奇癢異常皆有水無膿皆濕熱之淫溢於肌腠者也其水黃濁而黏其毒甚熾最易浸淫四竄不獨一人之身沾染此水隨即發粒癢搔即他人沾之亦易傳染而濕盛之人感觸其氣亦即同病此濕疥天泡瘡等證所以為流行病之一類世俗之人望而卻步誠非無因是為瘍瘡水毒之滋蔓者此外如遊風濕注濕臁濕癬旋耳瘡燕窩瘡陰𧈟瘡腎囊風坐板瘡諸證雖不致傳染他人而濕癢腐化為患略等此瘍科流水之一大類也若尋常癰疽既潰之後膿毒已泄余腫未消亦必化水外溢而後腫勢漸退則其水不黏或作淡黃色或竟清沏如泉漸漸從瘡口溢出必俟水盡復見稠膿而始痊愈則凡形勢較巨內攻較深者無不有此一候然為日無幾至多不過四五日而新肌漸滿是潰瘍順境流水之必不為害者若潰已有日其膿清徹不稠或僅見黃水或竟流清水綿延漸久是其人正氣不充滋養力薄必以養胃健脾助其生化之源庶乎水盡見膿肌肉漸能填滿否則水愈多而正愈傷殊非佳境凡普通瘍患恆以潰膿為順流水為逆職是故也別有足部之瘍積濕蘊熱忽發紅腫形勢堅巨浮紅光亮按之隨指陷下一時不能即起此證濕火若盛化腐最易即是陽發大毒俗名水疔宜於未腐之先以鈹針於光亮之處刺八九針或十數針針入一二分不可太深亦不可太淺形巨腫盛者即二三十針亦不為害必有淡黃水自針孔直流甚者盈杯盈盆則熱毒濕邪俱泄可免化膿大腐最是避重就輕之捷訣此濕盛熱盛之證臂臑手背亦間有之惟發於足跗兩脛者最多故俗有手發背腳發背之名而素有濕腳氣者又不時頻發皆宜針之此病吾吳俗名流火濕熱俱盛每易腐爛即所謂流水結毒也此則有水未泄而針以泄之之一法也又有鶴膝一證多屬寒濕治之不早必為痼疾綿延數月其膝獨腫按之甚軟知其有水亦以鈹針之較大者針而決之為日未久水色淡黃日久則為深黃為青緑黏稠異常有如雞卵之白此水流盡調治較易此內潰成水之又一種也若夫疔毒不聚有水無膿及腦疽背疽化膿不成僅有黃水隱隱則腫必大堅毒易內陷是為險證苟非調治有方使大毒化膿透達頗有大命之厄余如瘰癧頑瘡時而有膿時而流水則亦以見膿為順見水為逆流膿可冀成功流水必難收效而石疽失榮乳癖乳岩脹裂之後時而有水時而有血以及壞證之敗漿血水汙濁色晦臭腥者則皆百無一治此又瘍患流水者之最惡候也第十節論潰瘍之血瘡瘍潰後亦有偶爾見血之證辨其形色溯其源流為因為果有可得而言者在刀針初動之時膿隨血溢血色鮮明其血從皮肉之針口而來非膿中之本兼有鮮血也此惟初用刀針時有之凡小兒生瘍針之必多啼哭即血溢較多而頭面間尤甚以頭為諸陽之會血本易溢而啼哭則火升氣升且挾心肝兩經忿怒之火故其血更多凡暑天熱癤小兒最多用針必須俟其皮薄膿多為佳早針則血多膿少未必盡善有勞力傷經之瘍則其絡先傷膿中必兼瘀血紫而成塊則先瘀而後成瘍者也有手術不佳針傷大絡則絡破血溢其血較多是宜罨其針口以止之蓋本是絡中流動之血不宜聽其橫溢者也亦有潰瘍太巨並其大絡化腐則一經震動鮮血直流泄之不宜止之不易此宜令其安睡勿動而以手術其大絡則血能止有潰後膿色不純與血混合不白不赤作桃花色者則元氣不足血隨腐溢最宜清養若至元氣已敗則潰後膿不成膿血不成血汙濁垢膩是敗漿之不可救藥者也別有血瘤不宜妄針若不知而誤針之其血不止最易僨事亦有潰瘍初本無血忽然鮮血噴溢者或則動作過度震傷大絡苟能靜攝亦尚無傷或則大怒傷肝血隨氣湧涼血清肝亦易有效此外有血箭有血痣有肌衄有大衄皆血之無故自溢者雖非癰疽之類而皆是外證治瘍者亦不可不知要之無故血溢皆由氣火奔騰以致血絡迸裂是宜大劑清心肝之火鎮而抑之庶幾龍相安潛而洶湧波濤於以大定誠非杯水車薪所能救此燎原之禍者也第十一節論瘍科之外感六淫風火暑濕燥寒天之氣也人在氣交之中強者弗能為害弱者即留而為病此五運六氣之交乘宜乎外感之病為獨多治內科學者無不知時病為一大綱而外瘍亦何莫不然誠以氣化之偏時邪之勝其襲入經絡臟腑者則為內病而襲於肌腠筋肉者即發外瘍殊途同歸理無二致而謂治外瘍者可不與時推移先其所因而伏其所主耶試以諸瘍之繫於六氣者約略言之則頭面瘡瘍發頤時毒腮顴頷頰諸癰牙槽骨槽諸腫皆風淫所勝也諸疔暴腫陽發大癰咽喉口舌諸疳胬肉翻花諸候皆火淫所勝也而長夏鬱蒸秋陽酷烈暑濕熱三氣之中瘍患尤多則熱淫所勝流金鑠石之時血肉之軀蘊毒成癰釀膿作腐尤其易易況乎地氣溽潤天氣炎熇濕熱互蒸瘡痍滿目比屋皆然職是故也惟燥令既行氣候凝肅瘍患獨少而津枯液耗者每有肌膚皴揭血燥風生之患則又皮膚病之因於燥淫者也若夫寒淫所勝氣滯血凝則又有附著骨節之大疽及寒襲經絡之腦背疽皆宜溫經宣絡以化寒邪者林屋山人陽和一湯若為是證而設最為合轍獨惜其所著之全生集乃反以通治乳疽乳岩骨槽瘰癧則皆有肝膽經之鬱熱伏藏者率爾操觚貽禍巨矣要之凡治瘍患苟有六淫為病必先撤其外淫之邪而癰腫乃有消散之望所以瘡瘍大證時邪流注多有寒熱纏綿數日不解而瘍腫隨以發現者苟非寒止熱除不獨已發之癰腫必不能退亦且繼續而生糾纏不已此非深明乎內科理法泄化其在經絡之感邪則瘡證全無把握必至外邪俱解身熱已清舌苔不濁胃納加餐及不治瘍而瘍亦自已若專科家惟以外治為能事則病雖不重而亦多變幻無窮此亦瘍患中之最多數而必不能專治其外瘍者也逮膿潰之後其毒已泄以身熱自止為順蓋外瘍得膿猶如傷寒得汗汗後而熱不已者是壞傷寒即膿後而熱不已者為壞瘍病於此而補偏救弊隨證斡旋則無一不以內證為主殊非筆墨之所能曲盡其微者矣第二章外瘍脈狀第一節諸脈總論脈學淵微非悟徹神化之機必不能心與神歸見微知著初非僅僅於浮沉遲數大小滑澀之間辨其迹象而已可謂盡診察之能事得脈理之精神者也然為初學言之亦不能不先迹象而遽談化境惟能審其真理觀其會通乃有得心應手之妙而拘拘於古人之成説無當焉所以古今醫學諸家據脈辨證未嘗不極其詳備形描摹形迹者有時而失之呆滯高談玄理者有時而失之鑿空且有自古相承久經定論而一按其實在之情形反覺不能切合病機者則理想之辭拘泥太甚而不自知其不適於實用也如必詳析辨論求其坐可言而立可行未免梗塞難終言之辭費此非自為專書不能詳盡壽頤不揣愚陋輯有脈學正義一篇尚能闡發一二以補古人所未及然大率皆為內科言之於外瘍不能兼及茲為瘍科計則證發於外而脈見於里亦自有彼此響應歷驗不爽之理姑就各種脈象之切合於外瘍者詳其形態溯其源流以定吉凶以別疑似頗覺世傳治瘍諸書容有未盡明言其底蘊者雖曰信手拈來不無挂漏或有一得之見即在此中請舉所知以告同嗜第二節浮沉之脈浮沉者脈之淺深也脈顯在上輕手可得謂之浮脈隱在下重手始得謂之沉以稟賦言之則體質壯盛氣血充實者其脈有餘輕按易得有似於浮體質孱弱氣血衰微者其脈不及輕取不見有似於沉以形質言之則瘦人肉少寸口癯瘠者脈道顯露亦似於浮肥人肉多寸口豐厚脈管深藏亦似於沉古人謂瘦人脈浮肥人脈沉者其理如是非其實在之脈象一浮一沉也以情性言之則其人豪爽剛果用事者脈必應之而顯於外六陽之脈皆洪大必近於浮其人凝重柔弱性成者脈必應之而藏於中六陰之脈皆細軟必近於沉以天時言之則春生夏長氣泄於外脈亦為之浮顯秋收冬藏氣斂於中脈亦為之沉著以人事言之則勞力奔走飲醇酒之餘氣血奮張其脈無不浮露而凝默寡言安居靜坐之候情志泰然其脈無不沉靜此皆恆常之脈象各隨其人之氣體動靜而相與推移竊謂凡二十八種脈象無一不當作如是觀必不能倉猝下指而即知其若者主某病若者主某病者也即以病脈之屬於浮沉者而言昔人每謂浮脈主表屬腑屬陽沉脈主裡屬臟屬陰約略讀之鮮不謂此以表裡內外陰陽分別論證必無不妥抑知浮主表而沉主裡亦尚是理想之論斷籠統之泛辭已不能切中病情確合事理而浮脈屬陽沉脈屬陰浮脈主腑沉脈主臟則頗有語病未可拘執矣蓋浮脈之可以診得表病者惟表邪最盛時為然而外感之輕者脈必不浮若夫身熱甚厲之病脈必洪大滑數以其熱勢方張所以亦見浮象此則氣火俱盛而輕按即得雖似於浮實非浮脈之正旨病此者表裡俱熱必不當以其脈之浮而只知其為表病也又風熱之外感者其脈浮是為浮脈主表之一證然肝陽恣肆為眩暈為頭痛者氣火升騰其脈亦浮則病本內因亦非表證矣若謂浮脈屬陽而沉脈屬陰亦只可以論其常若陰盛於內陽格於外則脈且浮大而重按無根豈得概謂之陽證又熱結於裡氣道不通則脈亦沉著而凝澀不流豈得概以為陰證至謂浮主腑病沉主臟病則宋金以前本無是説而自明季以來編入四言脈訣幾於無人不讀四言脈訣本宋人崔氏所著而明人多有改本浮脈主表屬腑之説尚非崔氏舊本創是説者意謂腑之與臟一表一里則腑病蓋同於表病臟病蓋同於里病因而遂謂之腑病脈浮臟病脈沉其亦思五腑五臟相為表裡者只以腑與臟互為比較則腑固為臟之表若以全體言之腑亦深藏於里安得謬以為在表豈可誤認此表之一字而竟謂病在腑者其脈當浮假使腑病可作表病而脈為之浮則經絡之病肌肉之病皮毛之病其脈又當若何此理之必不可通而亦事之萬不能有者然今之醫者多讀脈訣固無不知有浮脈主表屬腑屬陽之八字可見俗書誤人真是不小究之浮脈主表沉脈主裡尚是含混言之或無不可若必謂浮主腑病沉主臟病膠執太甚最是不通頤謂古今脈書所稱某脈主某病者無不有是有非得失互見學者必須自具見解識透真理方不為古人所愚茲姑就浮沉一條聊申是説以為舉一反三之計只欲藉以糾正世俗通行之誤非好與古人作無端之辨難也若以浮沉二脈之屬於外瘍者言之則腫瘍脈浮惟上焦風熱諸證有之如發頤痄腮耳門牙槽諸癰病本在表而又屬風邪熱毒蘊於上部其脈無不浮數滑疾有痰宜泄有熱宜清亦不得以其脈浮屬表而但與疏風解表反令氣火越浮瘍患益熾若時邪襲於經絡而發流注則寒熱交熾表邪全盛之時其脈亦必浮數此則解表消腫雙方並進而表邪得泄腫瘍自化若瘍已成膿其毒全盛而未泄脈亦應之為浮數為滑大則決去其膿毒而脈自靜若潰後膿泄而脈仍浮者苟非外感之未盡即防續發之成膿若感邪既化瘍無續發而尚見脈浮則正氣散耗非吉症也若腫瘍脈沉則惟附骨大疽痃癖積聚之證寒凝絡窒氣血壅塞者偶有之其毒甚深其勢固結而脈為之沉凝不顯決非輕恙苟不急與宣通以疏達其凝結必不易治而尋常肌肉之癰腫經絡之瘡瘍於脈必無沉法若夫癰疽既潰膿毒已泄氣血疏通更無脈沉之理如或有之則其氣猶結其血猶凝亦非佳象總之瘍患為肌肉之病雖曰痛則不通脈必不宜過於浮露然壅者不化結者不開脈常沉澀不起而治之不應其為害又當何如耶第三節遲數之脈遲數者脈之緩急也氣火甚盛脈來急疾一息六七至者為數屬陽屬熱多實證氣血衰微脈來怠緩一息二三至者為遲屬陰屬寒多虛證雖間亦有中氣不充脈形虛數實積凝結脈道遲滯者而以尋常脈理言之固數主有餘遲主不及也是以腫瘍脈數皆為病邪之有餘其勢方張其毒方盛脈象應之必兼數疾或為身熱則數大而洪或已釀膿則緊數而實脈病相合是為常態若在既潰之後其毒已泄脈以安靜為吉如仍數疾不減則身熱之未淨餘毒之未化也初潰得之尚無大害化邪解熱即可向安若其遷延既久正氣日餒邪氣不衰而脈數不退或數大而中空或細數而急疾形神必憊真元消亡斯為壞證矣腫瘍脈遲多屬正氣之不及脈病不符甚非佳象此惟於虛弱之體偶見之而尋常之瘍所不應有者也惟附骨環跳諸證病因虛寒初起痠疼經縮脈象應之沉遲為正溫養舒經其毒自化若腦疽背疽寒邪在經遲脈亦為正應溫經宣托收效亦佳苟非此證則陽病陰脈宜求其故矣若在潰後邪勢已衰脈遲雖似相宜如果形證皆順養胃調元是為正治抑或神疲氣餒則餘毒未淨而真元欲漓脈至無神亦非吉象第四節大小之脈洪細附見大小者脈之形體也氣血有餘指下壯盛是之謂大大而有力則謂之洪氣血不及指下一線則謂之小亦謂之細大之與洪一是形式之粗壯一是氣勢之勇悍形神固自有別故古人皆分兩種然皆主有餘若小之與細則字義雖異而以脈象言之必不能分析為二故古人皆合為一平人之脈或大或小大率皆其人之稟賦使然初不以有病而過於變動惟以病脈言之則大為有餘是病邪之太過小為不及是正氣之式微故腫瘍氣滯血凝其病屬實其脈宜大而不宜小然所患苟非堅巨或其人素稟脈小者則小而有神亦何往而非佳象若大而有力堅硬搏指洪而氣悍洶湧奔騰邪勢太甚非吉證矣潰瘍氣泄血耗其病屬虛其脈宜小而不宜大然所耗或尚無多及其人身軀雄偉者則大而有神正是病魔退舍之機元氣未虧之兆若脈小形癯外瘍難斂尤可慮也惟腫瘍勢盛之時而其脈過於小弱不起則正不勝邪斯為危候若大毒既泄之後而其脈或豁大無根則元氣已漓無非敗象是皆當以形證與脈神參互考訂而孰吉孰凶自有定論萬不能於指下求其形似而即以為憑脈辨證之要訣盡在此中也第五節滑澀之脈滑澀者脈之氣勢也氣旺血旺其脈流利是之謂滑氣少血少其脈凝滯是之謂澀凡癰疽當腫勢堅硬之時脈多澀滯則氣有所聚血有所凝蒂固根深蟠結不化是其徵也而濕邪襲於經絡及濕痰矇蔽中州胃呆腦痞者其脈無不澀滯此皆實邪窒塞氣行因而不利治以疏通宣泄則澀脈自起若瘍已釀膿則氣血相搏其勢方張脈象應之必多滑數故腫瘍已成未成之機即可以脈之滑澀決之澀則內尚無膿猶可消散滑則膿已蒸釀無不外潰矣若癰疽即潰則氣結已通血滯已泄脈以滑利為順澀滯為逆蓋脈滑者其正氣之充清養化邪調復必易惟滑而大者余焰方張尚非正軌而脈澀者則血液已耗神色必疲滋養扶元所不可緩若更澀而小弱色奪形癯尤其可慮第六節長短之脈長短者脈之部位也氣血有餘指下勢盛尺寸皆溢是謂之長氣血不足指下勢促尺寸不及是謂之短故脈長者恆兼洪大滑疾脈短者恆兼虛弱細微此多屬於其人稟賦而憑脈辨證即隨之以決虛實焉長短二脈合寸關尺三部而言長者寸尺皆過於本位短者寸尺皆不及本位是以關部無所謂長短之象昔人每謂關不診短以寸關尺三部本是一線貫注不能離異故有寸不至關為陽絶尺不至關為陰絶之説然則關部即不當有短脈亦必不能以長脈論矣又陽氣上盛之病脈長於寸即短於尺相火下盛之病脈長於尺即短於寸則所謂上魚入尺之脈偏盛於上者必短於下偏盛於下者必短於上與專論長短之合寸尺而言者不同凡病而得長脈若非其人之體質素強則病魔之勢焰方張也或虛陽之浮露於外也若更長而不實長而無神則形似有餘而其實不及非佳兆矣凡病而得短脈若非其人之體質素弱則氣血之俱衰也否則實邪凝結於中而氣道不舒也若復短而無神形氣俱餒更難圖矣故腫瘍脈長無非陽邪之勢盛而腫瘍脈短則為大毒之堅凝若在潰後膿毒已泄氣血已傷於脈宜斂則短者似尚合宜長者必多變幻苟非毒邪之不減即其元氣之外浮所謂證虛脈實皆當顧慮惟脈短終是正氣不周津液既耗而脈應之滋液養陰是為正治若其短澀無神則真陰欲竭亦自可危第七節虛實之脈虛實者亦脈學之綱領也三部九候力量有餘皆可謂之實三部九候力量不及皆可謂之虛則凡言實者可該弦徑洪緊諸脈而凡言虛者可該微弱遲軟諸脈初非專以虛之與實指定一種形象之名稱而昔人每以浮而無力為虛欲以別於沉而無力之弱脈以沉而有力為實欲以別於浮而有力之革脈細分畛域雖亦不為無理壽頤竊謂虛實二字之本義不當如是豈中候沉候之無力者必不可以言虛而浮按中按之有力者必不可以言實耶顧名思義當亦恍然所以診得實脈苟非體質之壯盛必其病勢之有餘然堅實太過搏指不撓則邪勢方張已失沖和之性診得虛脈或為稟賦之素弱無非元氣之不充而虛弱已甚指下無神則根本欲漓幾等尸居餘氣故腫瘍脈虛雖曰病有餘而脈不及然苟非大證而其人形神未餒則微見虛軟未必遽為大害惟瘍患甚巨而脈來虛弱已甚者是為脈證相反必多不治而腫瘍脈實雖曰病是實邪脈證相合然果堅徑異常則大毒盤踞蒂固根深寧不可慮潰瘍脈虛是為氣血乍泄於法為順然必風波大定余浪不興清養扶持始登彼岸如其惡腐未脫毒焰未衰而脈已虛軟不起惟恐正氣難扶同歸於盡若潰瘍脈實必其餘毒尚盛氣血未和如膿泄太多脈反堅實者必難善後也第八節弦緊革牢之脈弦者脈之剛徑有力端直而長者也為肝陽之自旺為痰飲之鬱結緊者脈之固定堅直應指不撓者也為寒邪之外束為實邪之內凝素問有脈實堅之説傷寒論平脈篇寒則牢堅脈經引之作寒則緊弦是緊脈亦可謂之堅脈皆以形容其指下有力耳叔和以緊脈為轉索無常非是蓋緊即有力不散亦與虛實之實脈相近革者浮候之堅大有力牢者沉候之堅大有力一為孤陽之浮越於外一為陰寒之凝結於中脈理主病適得其反而形勢之堅固有力則一此四者皆脈象之屬於實者也瘍患得此無非病勢方張其毒甚盛可從上條實脈之例求之第九節軟弱微散之脈軟弱者脈之應指無力者也昔人每謂浮細無力為軟沉細無力為弱分為二種頤謂軟與弱按其字義本難區別若即以一浮一沉定為二候但據脈之部位而言固無不可然論其所主之病則固同是氣血之不足耳似不如渾融言之較為圓相千金翼始有濡脈一條而後之言脈者幾以濡脈軟脈別為兩類考素問平人氣象論平肝脈來軟弱招招脈經引之則作濡軟蓋濡即軟字變體最古只有耎字後乃作軟俗則作軟而從耎之字漢人隸書亦多從需二字音讀雖各不同而字形字義皆近遂至不可復正所以內經脈耎之耎後人竟作脈濡實非濡濕濡滯之濡字壽頤言脈有耎無濡從其溯也微脈者即軟之尤甚者也若更渙散不收指下似有如無則為散脈此四者皆脈象之屬於虛者以言外瘍則未潰屬實軟弱之脈皆非所宜然在病勢不重瘍患不巨者偶見軟弱亦未必遽呈敗象若在即潰之後其正已傷脈形軟弱尤為合轍惟微脈則無力太甚未免元氣不支散脈則散漫不收多是本實之先撥無論腫瘍潰瘍都無吉象是皆當從上條虛脈之例以求之亦可舉一反三者也第十節緩脈緩脈本有二義一為和緩之緩則一息四至胃氣之正所謂不大不小不剛不柔意思欣欣難以名狀者無病之脈當如是也一為怠緩之緩則濡滯不前濕阻中州者有之而濕流關節者亦有之故瘍病而得和緩之脈即閣中和之氣無論已潰未潰無非泰境而得怠緩之脈者亦無往而非濕邪之留著也第十一節芤脈芤者脈之中空者也是為失血之候蓋血液既泄脈道不充有如蔥管凡失血家往往見之固非昔賢之空言也而瘍病在未潰之時於法當無芤象如果有之則其人平時之亡血者也若在潰後則膿血大泄時亦偶一遇之然苟非大證日久膿去甚多者亦不恆有此脈補養滋填勢不可緩第十二節動脈動者脈之一粒突起如珠如豆厥厥動搖者也於法主痛蓋痛則氣滯著而不行脈道不能條達因而凝聚一處如珠動搖此雖不恆有之脈象雖閲歷多者固時一見之素問謂婦人手少陰脈動甚者妊子也是亦氣血初凝脈行不暢之理診妊脈者亦或遇之故外瘍而得動脈無論已潰未潰皆其毒邪凝聚氣道不通致令脈絡不暢壅而為此否則痛盛氣結而脈應之是皆當從事於宣通疏泄而求其氣機之條暢者也第十三節伏脈伏者脈之沉伏不見者也輕按不得必極重按之而始一應指苟非病邪之深邃則陰寒之凝固也否則大痛氣結而脈為之阻也故以外瘍言之病在肌肉於脈必不當伏如果有之則附骨大疽盤根錯節必非一朝一夕之故矣而大毒釀膿病勢極熾之時亦偶一見之則痛極不通脈澀已甚即沉伏不見如在潰後則其毒已泄其氣已通更不當再有伏藏之脈尚亦見之則其毒固結不以膿成而稍減其勢其凶何如第十四節促脈促脈自叔和編傷寒論之辨脈法及其自著之脈經皆與結脈對待成文以促為數中之一止結為遲中之一止而後之言脈者多宗之頤謂促字本義短也速也仲師本論言促脈者四條殊無歇止之意而於脈結代心動悸者炙甘草湯主之一條明明以結脈與代脈對舉結為無定之歇止代為有定之歇止並未言及促脈則促非歇止自可於言外得之高陽生脈訣謂促脈並居寸口蓋獨盛於寸部之脈主病為上焦有結故脈為之促頗與促字短速之義相合楊仁齋等諸家皆承用是説以視叔和數中一止之解較為圓通且於本論促脈四條無不可通蓋惟陽盛於上結澀不通於脈應之短而且速臨證治驗確然可徵叔和以其既短且速急迫之態有似於不能聯屬之象因以偶然一止引申其義似其立説之初用意亦不甚相遠但後之讀者僅知有歇止一層而忘其短速之象遂與古人命名本旨毫釐千里乾隆時日本丹波元簡脈學輯要亦主此説引證尚為明晰以內科為病言之則陽升頭面氣結胸中或痰聚上脘者其脈皆獨盛於寸促速不舒是其明證以外科言之則上部實熱壅而為瘍者亦當有此脈象丹波氏謂獨盛於寸與溢出上魚之脈相似故其脈學輯要促脈條中附以溢上魚際之脈壽頤則謂上溢者主陽升巔頂故脈溢出寸部之上而促主陽盛上焦尚在寸脈本部形勢亦自不同是當分別觀之第十五節結代之脈結代皆歇止之脈結為無定之止尚是氣血失調偶然停頓代為有定之止竟是臟氣缺陷習為故常所以代生結生顯然有別然即以內科言之老人氣血既衰循行不及即見代脈亦未必遽是死徵苟其頤養得宜尚可綿延歲月但終是不足之徵兆殘齡風燭刻刻可虞耳以言瘍證則腫瘍雖皆壅塞不通惟皮肉經絡之病苟非大證必不當有結代之脈而內癰固結及痛勢極熾者偶一見之是當解結定痛方能脈復即安久見結代必非佳兆若潰後則閉者已泄滯者已通脈道周流當無結塞如其有之則真元不續恐難為力矣第十六節上魚入尺上焦氣火沸騰脈必應之而上溢甚者且弦出寸口直上魚際此心肝陽盛者有之其證為眩暈頭痛直達頂巔或且沖激腦經昏瞀無識而瘍家實火證亦有此脈頭面疔毒時一見之下元相火不藏脈必應之而下盛甚者且垂入尺中搏徑有力此肝腎火熾者有之於內證為強陽不痿為陰挺頑痛為陰汗濕癢皆龍相之橫逆莫制者也於瘍家亦主二陰毒火諸恙如急性子癰如濕熱外痔及便毒痃疽之勢焰方張時恆有此垂長之脈而足胕水疔陽發大毒頃刻化腐者亦時一見之第三章治瘍藥劑第一節總論瘍家藥劑必隨其人之寒熱虛實七情六淫氣血痰濕諸證而調劑之故臨證處方無論外形如何要必以內證為之主此瘍醫之最上乘也苟能精明乎內科治理而出其餘緒以治外瘍雖有大證亦多應手得效試觀近今內科名手本非治外專家而偶治外瘍亦復時有奇效此事實之有可考者而亦事理之最可信者且亦天下之良醫所公認者也惟是瘍之為病甚繁賾矣即其外候之變遷亦復層出不窮步驟次序必不可紊設非專心致志研究一番縱使長於內科理法深邃而移以治瘍即能大致楚楚然細緘密縷必有不逮則按之實際亦不能按部就班銖兩悉稱蓋治瘍大旨雖無不以內證為權衡而對於外證如消毒止痛去腐生新之類必須有二三味合宜之藥為之導引而後內外各如其分否則全無關係又安能收復杯取效之應況乎所發部位各有分野分經論治尤不可籠統含糊浮泛不切而世俗所傳外科各書且有百病通治之煎方寧不隱約模糊長如黑暗地獄如通行之仙方活命飲神授衛生湯等方凡是瘍醫家言無不列之首簡謂為能治一切癰疽退毒定痛如何神效云云試為考其實在作用龐雜無紀既無法律可言又安有效驗可望蓋凡是一病雖曰自有對病應驗之藥然同此一病而溫涼寒熱虛實輕重始傳末傳亦復各各不同已無預定一方可以通治之理而乃曰古有成方且可通治上下大小一切癰疽未成即消已成即潰自治至終無不合轍揆之情理其謬何如須知見證治證隨宜加浮蕪雜無一是處而乃大張其名眩人耳目一則曰仙方再則曰仙授自詡神通適以彰其妄誕而已今試以仙方活命飲一方論之藥用乳香沒藥赤芍甘草節歸尾穿山甲皂角刺銀花白芷陳皮花粉貝母防風十三味乳香沒藥固世俗所謂止痛之套藥也其性黏韌能合金刃創口外敷止血定痛最有神驗又可研敷作外瘍生肌長肉末子藥此乳沒兩味之第一功用也又其氣芳香能舒肝胃之氣則內服以治肝心隱痛亦或有效古人之用以止痛者如此然其質是樹膠一入煎劑黏稠凝膩其臭反惡難於入口即令勉強吞咽亦必惹胃泛惡甚者則吐古人用此二味皆入丸散未見有作湯飲者本草綱目所引諸方尚皆如此而後之俗醫乃以止痛二字亂入煎方姑無論其有無效力而令病者飲此濁膠徒犯腸胃亦已太酷蓋俗醫只知人云亦云並未深明古人用藥有法若令醫家親啜一匙吾知其亦必愁眉閉目而不能下咽甘草能治外瘍乃甘為土之正味百毒入土而化故甘草能消外科之毒然甘者必膩若濕病痰病得之必滿必嘔古人成方雖多以甘草調和諸藥而今人則用之甚少誠有見於此中弊竇況在外瘍濕痰為病最多故患瘍者舌苔多厚濁黏膩甘味皆是禁藥況大甘大膩如國老乎又俗醫每謂甘草節專治瘍患其説不知何本考李氏瀕湖本草綱目引書最博辨藥極詳於甘草有梢有頭而獨無節可知明代尚無此謬説今就藥肆中持甘草觀之長者尺余兩端如一其節安在而俗醫處方竟大書特書曰甘草節若干豈非以盲引盲之故態或謂甘草在未採取時土中為蟲所蝕有斑駁缺蝕之處即謂之節以其已經剝蝕等於肌肉之瘡瘍故專治瘍其説頗似有理然細思之終覺可哂赤芍歸尾破血活血惟是血瘀者可用平常和血通絡宜用全歸若甲片皂刺走竄外達最易催膿潰惟大證內已成膿而深在肉裡早用刀針大是痛苦不得已而用此二物使之向外麵皮膚透達俾得從速用針可免內攻化巨亦是避重就輕之法若內膿未成猶可消散而妄用之適以助其成膿外潰則小病化大而大病可危病者何辜與醫何仇而必令其慘痛號呼膿血橫決何其忍耶陳皮貝母惟上部熱痰為患如發頤痰核之類宜之白芷芳香上行可散頭面之風防風辛溫以散寒風為百藥長而風熱已大非所宜若在溫熱濕熱諸病豈非鴆毒銀花花粉則清涼之味宜於溫熱而寒證所忌似此溫涼並進糅雜成方而曰治一切癰疽無論陰陽寧非大謬又王氏全生集有小金丹醒消丸等方頗為時俗所尚然亦無通治百病之理而近更有所謂六神丸者以珠黃腦麝蟾酥腰黃六物為方以百草霜為衣價值兼金可為貴重而按之藥性病情亦非外瘍有效之藥乃俗人不察群認為治瘍必效之神丹甚至醫林亦推重之不從效力上著想而惟以重價為佳徒耗病家資財庸陋之尤更是可笑壽頤秉師門家法參以生平閲歷頗覺一病有一病之方劑尚必隨其人之氣體而相與變遷已非板方所能必效更安有預備數方可以泛應曲當之理但分證言之亦未嘗無門徑之可尋用是撮其大旨分門別類列舉各法姑示涯略雖曰東鱗西爪必不能曲盡精微要之門徑既清則臨時制裁自能變化較之從事於古方之渾漠無垠不分虛實不辨溫涼者不啻指南有針導之覺路矣至於外治各藥退毒圍毒溫散涼散提毒消毒止痛止血收濕止癢去腐生新諸法咸備與內服煎劑各收效果更不可泛泛不切敷衍了事考之古書成方千萬可供實用者竟百不得一甚者且貽誤無窮不能照書配用幸圖一效要知事倍功半既不當以臨床為練習之場如果以藥試人且不啻借病人作習射之鵠爰以師門心法暨半生經驗各藥別為一章並録於篇務使一方有一方之效力俾同學者習此一編而隨宜施治綽有餘裕藉以利濟蒼生拯其疾苦鯫生事業差足自豪若夫內服煎劑分證治療則各有攸宜不能泛然立方仍蹈通套之陋因別採瘍科治案輯為平議一編庶幾是是非非具有經緯治瘍一門無餘蘊矣第二節論腫瘍退消之劑治瘍之要未成者必求其消治之於早雖有大證而可以消散於無形病者不以為功醫者亦可省許多手續此良醫之用心而亦治醫之最上乘也惟是消腫之法最為細密一病有一病之來源七情六淫三因各異若不能於病之本探其源而治之則斷無消散之希望而或者乃僅僅於部位上形色上求之抑末矣如病本外因則風寒暑濕之侵淫既各隨其感觸而成瘍患如病本內因則氣血痰鬱之壅滯亦流注於經隧而發大癰故凡退腫消毒之大法以治外感則有風者疏其風有熱者清其熱有濕有寒者理其濕祛其寒以治內傷則氣滯者理其氣血瘀者行其血痰凝飲積者導其痰滌其飲正本清源無一非退消之良劑此外惟有五志之火七情之郁其來以漸結為堅腫如乳癖乳岩失榮石疽等證則由來已久蒂固根深雖有養液和榮軟堅流氣之良法而苟非病者擺脫塵緣破除煩惱怡情悅性頤養太和則痼疾難療必無希冀而其餘諸證批郤導窾孰不迎刃而解然必辨之也精斯識之也確因端竟委探本窮源已非庸耳俗目之頭痛醫頭腳痛治腳之所能望其項背矣第三節論腫瘍內已成膿之劑腫瘍治療總以消散為第一要義能於消腫各法隨證分治縱有大證亦可衰減其勢所謂大化為小小化為無病者隱受其惠於不知不覺之中醫者亦有功而不居仁人之用心不當如是耶至不得已而消之不盡或治之已晚內已釀膿勢必不能全退於斯時也內服煎劑亦惟以消散為主仍須分別病因依上條退消各法隨證用藥蓋以中雖成膿而四周之腫猶在故仍以消腫為急置其膿成於不問庶幾余腫既消即成潰亦必不巨萬不當早用透達之藥令其迅速蒸膿攻孔日大收斂費時山甲片皂角針走竄極迅透膿極易未成膿者早用之即易蒸膿不能全散惟陰寒之證堅塊漫腫借其流動之勢亦可消散凝滯若有膿成肉裡深藏不透則用此並加川芎能使腫勢高突透達於外提深就淺亦是一法惟腫瘍苟非真氣大衰之人必無用補之法一投補劑助桀為虐俗子不知誤於張潔古黃耆為瘡家聖藥一句動輒亂投致令輕證化大者不可枚舉害人不淺而治瘍者皆不知其弊良可浩嘆第四節論腫瘍行氣之劑瘍之為病必腫必痛其故無他氣血壅滯窒塞不能而已所以消腫止痛首推行血行氣為必要之法惟行血不可太猛破血逐瘀之品非可輕率亂投轉滋流弊而行氣之藥可以萬全無害抑且血之壅即由於氣之滯苟得大氣斡旋則氣行者血亦行尤為一舉而兩得此則古人治瘍注重氣分洵分握要之圖也宋李氏集驗背疽方有五香連翹湯內補十宣散竇氏瘡瘍經驗有許多流氣飲雖方藥未免叢雜而多用氣分之藥最是古人治瘍正軌壽頤謂氣為血帥血隨氣行天地之大必以空氣運行化生萬物而人在氣交之中動作行為無一非此大氣流行為之鼓蕩所以凡治百病必參以氣分之藥而後吹噓運用功效乃神古人補血之方首推四物地黃厚膩非得歸芎辛溫運動之力則呆滯有餘弊多利少制方精義即在利用氣藥而俗人昧焉且謂當歸川芎即是補血之物於古人用藥真義未能體會哪不可怪況在瘍患明是氣滯不行為病苟不振動其氣機何能有濟此固治瘍者始終利賴之捷訣而凡通達經隧宣絡脈之法因無一不在行氣二字之中者矣第五節論外瘍治痰之劑痰者本非吾人體中應有之物質而以觀近人病狀則挾痰之證甚多豈丹溪所謂東南地土卑濕由濕生熱濕熱生痰果得之於土薄水淺而非人力之所能為耶毋亦體質素弱脾運失司大氣之斡旋無權飲食之消化不力坐令水穀之精不為津液以灑陳於五臟和調於六腑而徒釀為頑痰濁飲有以助長病魔耳古人恆謂肺為生痰之源胃為貯痰之器者以肺為呼吸之道路氣機不利則氣化為水而水飲停留胃為水穀之淵藪運化不靈則食即生痰而濁涎盤踞此痰飲之潛滋暗長於肺胃中者尤其淺而易知顯而可據若夫經絡肌肉之間而亦多痰病則非其肺胃之痰可以隨氣血流行以入經隧蓋亦其人之運行不健營衛周流有時偶滯遂令絡脈中固有之津液留頓於不知不覺之中譬彼源泉本是澄清之故道而下流既阻汙朽積焉有如山蹊初亦行人之捷徑而為間不用茅草塞焉此四肢百骸皮裡膜外所以停痰積飲之淵源而外發癰瘍亦往往而多痰證則治瘍者可不於此加之意乎惟痰能為瘍其基礎則本於氣機之阻滯其成就亦別有感觸之原因有因外風時熱以激動其痰者則風性升騰上行而迅疾其證多在頸項腮頤如發頤痄腮項前頜下諸癰皆本於結痰而動於外風成於血熱則化痰也而必泄熱疏風有因肝膽內熱以熬煉其痰者則相火鬱窒入絡而貫聯其證多在耳後項側如瘰癧馬刀連絡成串皆本於木火而煎爍血液馴致堅凝則化痰也而必舒肝清火有胃絡之結痰則乳房之結核是宜兼泄胃家之實若夫氣液久虛痰流經隧歷久始發之流痰則非培補不為功而久郁之痰有年痼疾如石疽乳岩者則根深蒂固且其人必滿腹牢騷又非藥力之可以抒愁解結者夫豈化痰二字所能希冀百一此雖同是痰病而淺深大是不侔果能分別源流投機處治當亦可以十全八九又凡瘍患之挾痰者尚有部位可據亦必見證分治則項側耳前後多風火亦多肝火宜辨內外之因脅肋癧串有實火亦有虛火宜求銖兩之稱若胸腹肩背皆是流痰而四肢之部則惟兩臂間有流痰發生而自股以下無之學者慎弗以股脛之瘍誤作挾痰論斷而反以貽笑方家也第六節論外瘍清熱之劑外瘍為病外因有四時六淫之感觸內因有七情六郁之損傷種種原由無不備具而以最普通者言之則熱病其多數也蓋外感六淫蘊積無不化熱內因五志變動皆有火生此則內科百病屬熱者亦必居其大半況在外瘍肌膚灼痛肉腐成膿謂非熱鬱於中有以消爍之而何此世俗治瘍所以無不注重於清潤寒涼一途誠不能不謂其大有適用處也雖然瘡瘍之屬於熱者固是最多頤必不敢偏信林屋山人陽和一湯謂為泛應曲當而妄加無辜者以炮烙之刑聽其慘暴哀號焦肌鑠骨究之熱病情況萬有不齊欲求其分量咸宜銖兩悉稱似亦不易固非如街頭賣藥市上搖鈴者記得芩連膏黃銀花地丁數味而可以盡瘍醫之能事者也試以瘍病之屬於熱分別言之有風熱之證因風而生熱者如頭面諸瘍及遊風之類是也雖宜清熱而必先辛涼疏風不得早用寒涼之藥否則熱已退而堅塊猶存久留不消終為頑證甚者寒涼直折反致血滯氣凝適以助虐有濕熱之病因濕而生熱者如濕癢諸瘡及臁瘡流火是也雖亦必清熱而尤須淡滲導濕不得恃芩連等味否則熱勢漸解而濕積不化腫腐難瘳惟有毒火之證發為疔瘡來勢迅疾易散難聚熱毒不僅直入血分且必與心肝二臟有直接關係所以毒散走黃毒散而內陷俗謂之走黃字義極不可解而婦孺皆知有走黃二字以患疔毒死者或有全體發黃如金色者實即毒入經絡不能自化鬱蒸以成此變走黃之名蓋由於此必有神志昏迷肝火橫逆見證則治法雖在腫猶未盛之時而審證既真即當大劑涼血並清心肝之熱鮮地芩連犀羚丹芍均是必需之要否則變幻異常捷於奔馬一擊不中補救綦難此瘍科中最為激烈暴戾之證所當救焚沃焦重劑急進不可輕描淡寫杯水車薪反致頃刻燎原不可向邇者也療毒之易於走黃者頭面諸疔為甚腫勢漫溢堅硬異常針之無血無水無膿一至神思恍惚言語模糊宜其難療早用犀羚可治十九亦是涼降以平氣火使之不復上攻耳所以頭面之疔易成危候也又手指亦多疔瘡用藥亦同此理但其勢較緩可治者多惟紅絲疔一種自發腫之處生出紅暈一條現於肌肉之表從臂上行漸以及腋相傳謂此紅暈過腋入胸即為不治而頤治瘍三十年尚未見此壞證或亦古人理想之辭閬師謂此是心家之熱藥以瀉心為主重用芩連梔翹投之輒效總之皆清心肝二臟之熱蓋心肝是君相二火之源證雖在表而源本於裡所謂病之輕者皆在經絡惟重病則涉及腑臟者也外瘍之宜於大劑寒涼而不虞其太過者惟此一證足部亦有所謂水疔者初則紅腫蔓延大熱大痛不一二日而腐化甚巨此其濕火毒邪亦必犀羚芩連大劑急投可救危難而又以淡滲導濕輔之此是濕火與毒火相合之病與專治毒火者尚宜微分門徑若夫外瘍潰後有火宜清則視其證之險夷而辨銖兩苟非陽發水疔水疔亦稱陽發毒絶少大涼之法蓋潰後最宜顧其元氣而尤必以調和胃氣為主苦寒損胃且耗真元若不知分量而惟以清涼解毒四字作為枕中鴻寶則瘍患之不死於病而死於藥者多矣第七節論外瘍理濕之劑普通瘍患惟濕熱二者最多偏於熱者灼痛成膿偏於濕者發癢流水大率痛癢膿水之分途即熱毒濕邪之分證也熱毒為患多發於身半以上濕毒為患多發於身半以下是火恆炎上濕恆潤下之症且濕瘍浸淫每在皮膚之表四肢之末則濕之積滯其源由於脾土卑監卑監二字借用素問之土運不及名曰卑監是土德之卑下也而脾主肌肉四肢濕邪淫溢則漸漬於肌肉走竄於四肢亦固其所惟是濕邪為瘍最多挾熱苟非濕與熱蒸亦不四散走竄惟與熱交併乃始流注於肢體外達於皮毛所以治瘍之濕亦必與清熱之劑相助為理有濕而兼風熱者如遊風之上行於頸項洋溢於肩背則清化濕熱而必佐之以疏風有濕而兼血熱者如疥癬之癢搔則清熱化濕而必主之以涼血有脾胃濕熱而旁行於肌表者則黃水瘡等之滋水頻仍宜醒胃快脾而分利以通之俗稱天泡瘡者是有肝腎濕熱而下流於陰股者則陰𧈟瘡等之濕癢不已如前陰之腎囊風後臀之坐板瘡皆是宜涼肝清腎而苦寒以燥之若濕熱下注已達股脛為濕注濕臁跗腫流火之屬燥濕清熱仍非淡滲通利不為功惟濕盛火盛紅腫巨腐之陽發大證則毒火猖狂不三五日而腐爛盈尺苟非大劑清熱解毒急起直追鮮不誤事此是燎原之火救焚手段萬不容緩帶輕裘從容貽誤者也若夫濕重熱輕流入關節則為流注寒濕互阻滯於經絡則為痹著凝於筋骨則為附骨環跳鶴膝委中諸證脈必澀滯舌必白膩是宜於燥濕宣絡溫經流氣初起之時必以溫運入手苟得氣血流通投匕輒效若至遲延淹久濕鬱於中馴致化熱內欲蒸膿已難操十全之勝算矣第八節論外瘍溫養之劑外瘍非無寒病也天寒則水澤腹堅人血凝澀留著不行壅而為瘍理有固然無足怪者然而瘍病之寒只是陽凝之氣襲於絡脈非臟腑之真寒可比故治寒之劑溫經宣絡疏而通之一舉手間無餘蘊矣固無所用其大溫大熱九牛二虎之力者也以頤所見外瘍之宜於溫養者言之大約只有二種證候一則腦疽背疽寒之在於經絡者也其外形且多紅腫發熱惟病發腦後部位屬陰且太陽寒水之經外證必惡寒畏風舌必淡白無華其濕痰盛者則多白膩厚膩尖邊亦必不紅絳脈必細澀無力即間有渾濁而大者則毒盛腫盛之故也然必不能洪數滑實亦有按之有力者則毒勢凝聚不化之徵尤為重證治之如法其毒得化證勢少鬆而脈即無力矣其項背必牽強不利皆寒邪之確證於法必溫經宣化且必升舉大氣通行經絡此所謂升舉大氣者如川芎羌活可以透達皮毛使毒得外泄非東垣補中益氣之升柴也雖有大證效如反掌而昧者見其皮膚紅腫輒投涼解則毒陷神昏危象立見矣一則附骨環跳之寒在筋骨者也初起經掣骨痛不能行走甚者足短不伸動則大痛而皮膚肌肉尚未腫也此時亦以溫經散寒通經宣絡數付必效逮遲至數日內分堅腫而病狀始著病根漸深然脈尚細澀舌尚白膩仍用溫化猶可及也更逾數日則寒邪化熱其腫越堅其勢越大脈漸轉數舌漸轉紅而內欲釀膿則用藥頗費斟酌而淺者只知是證利於溫通至此猶用一派剛燥則催其成潰鮮不久延難斂漸為瘡勞則醫者之手續費事而病者之性命可危矣此外則鶴膝踝疽有寒濕證有虛寒證腰疽腎俞疽多虛寒證皆可溫養甚者亦可溫補流痰流注有寒濕證亦有虛寒證骨槽有寒痰證皆可相度機宜參用溫化然熱藥必不可過度過則寒必化熱助其成膿皆藥之咎非病之變也若夫痰核癧串乳疽乳岩失榮石疽諸頑證其始堅硬異常未始非陰寒凝結之象然此等病源皆挾鬱火且多在陰虛之體和血養陰猶虞不濟而論者每謂此是寒凝實證吾以溫藥和之則離光普照冰雪皆消王洪緒陽和一湯在彼固説得幾於無病不治而近人用之每見其弊未見其利慎不可辨證不清一味盲從壽頤同研友潘輔臣室人丙辰冬月如覺左乳結核丁巳正月自服陽和湯十六帖日漸長大至三月中延頤診治形勢高突周圍七八寸延至腋下手不能挾已不可為矣其人性情安和處境尚順無鬱結證而乳岩頑病竟迅速異常至於此極若非陽和湯必不致此延至七月以漸脹裂竟爾慘死大可憐也第九節論外瘍補益之劑俗傳瘍科諸書鮮不謂癰疽大證利用補托所以舉世之治瘍者凡見證候較巨無不參朮耆苓唯補是尚而素習景嶽者無論矣不知瘡瘍大毒氣血壅滯窒而不行留而不去一經補托其象何若清夜捫心亦當覺悟而暑熱之互阻寒濕之痹著者蠻補之變又當何若壽頤治瘍秉承先師朱氏家學每謂除虛損流痰腰疽腎俞附骨環跳數者以外絶少虛證而世之習於補托者每引本草經黃耆主治癰疽久敗瘡排膿止痛之説且謂金元以後皆稱黃耆為瘡家聖藥宜乎一遇瘍證無論癰腫焮赤風火暑濕自始至終輒以黃耆從事而腫者越托越高潰者且補且腐古人所謂養癰貽害者真是為此等補藥寫照而病家醫家彼此不悟其故安在蓋即誤讀本草經黃耆一條之害也繹本經之意所謂治癰疽之久敗者黃耆是固表實表之主藥表虛之病獨擅勝場凡病癰疽而至於久敗則膿水淋漓津液耗竭其虛在表惟黃耆能補其耗傷固其元氣本經大旨極易明曉非謂大毒乍發邪勢方張者而亦必一例用固表法也不謂淺者讀之只見其治癰疽云云而置久敗瘡三字於不問且更為之申一解曰耆是癰疽聖藥一若凡是癰疽不論虛實寒熱有毒無毒非用黃耆不可者於是立齋景嶽之書盛行而欲排膿者越排則膿越多欲止痛者越止則痛越劇教猱升木為虎附翼賈生所謂一脛之大幾如腰一指之大幾如股者於是實踐其説而不知即其排膿止痛有以玉成之甚矣古書之不易讀也壽頤治瘍非不知自有當補之法如虛損流痰及腰疽腎俞流注等證皆為氣血俱衰運化不健痹著不行非得補益之力流動其氣機則留者不行著者不去然必非專恃參耆數味可以幸中若腦疽背疽即經腐化而膿毒不暢惡肉不脫無非氣血不充不能托毒外泄亦非補劑不為功而老人虛人尤須溫補更有瘍毒即潰膿水較多而其人頓形癯瘠者亦宜參用補法然一二劑後胃納既蘇精神既振即當撤去補藥仍與清理蓋餘毒未清終防死灰復燃補而益熾亦如治時證者大勢乍平必不當驟然蠻補反以留戀餘邪釀成變幻總之醫以治病非以治虛有病則惟以去病為主補養二字決非通治百病之法內外二科皆此一理而舉世之習於立齋景嶽者不知也而富貴家之知有虛不知有病者不悟也然則補藥療病殆專為迎合富家心理之作用乎而醫學從此掃地盡矣若其人果有虛證必當補養者則自有內科理法在非瘍醫界內之事茲亦不贅第十節論外瘍提膿托毒之劑外瘍為病血凝氣滯實證為多泄之化之消之散之通之行之猶恐不及初無所用其托裡之法也自淺者誤讀潔古黃耆為瘡家聖藥一句而瘍醫家竟以托裡為能事開口黃耆動乎參術縱能迎合富貴家嗜好而養癰貽禍之説於以實踐豈以其腐爛不巨不足以顯醫者之絶技必補之託之使痛苦既深而痛者之呼號益切然後託孤寄命而可以邀大功耶壽頤治瘍恆謂自腎俞腰疽虛損流痰外無虛證然即對此虛證亦必以宣絡行氣為先務初非全恃蠻補而可有消散之希望若誤認托裡為必要之訣則外證越巨而元氣越傷未有不速其成膿而殞其生命此補中托毒一層最為頤之所腐心切齒者也惟附骨大疽膿成於里不能透達外泄一時未便奏刀則不得不投透膿之劑速其外達庶幾膿毒可泄不然者內攻益劇蝕骨腐筋為害越厲此則皂刺甲片固亦有時而偶為借重若漫腫無膿之時萬萬不敢輕投此物蓋甲片攻堅皂刺鋭利皆有釀膿速潰之能力苟其證尚可消而輕率用之則不能內消而令外潰則無堅不破無孔不穿矣至如腦疽背疽兩證以有膿外達為順無膿內陷為危非用透膿之法不可然不過宣通氣機疏達腠理而已川芎歸斷足以了之非皂刺穿山之任也又疔毒為瘍家大證毒聚膿流雖困無害毒敗無膿雖小必險則以解毒清熱大劑消其餘腫而膿毒自回必不可雜以透膿之藥而膿自無不透者凡此皆以透膿為主義而所以使之得膿者又各有其理以此知一證自有一證之治法必不能執一板方而謂某方可有若何之妙用者也第十一節論潰後養胃之劑外瘍既潰膿毒既泄其勢已衰用藥之法為清其餘毒化其餘腫而已其尤要者則扶持胃氣清養胃陰使納穀旺而正氣自充雖有大瘍生新甚速蓋當膿毒未決之先痛苦備嘗其氣已憊胃納必呆一旦決之使潰痛定體輕如釋重負果有餘毒未盡仍以清理為先如其毒急焰已衰必以養胃為主無論如何大證但得胃氣一調轉機立見縱其潰爛綦劇亦可指日收功但不可惑於俗書早投蠻補須知大勢乍平火焰雖息而餘燼未泯一得補益則爐中添炭未有不死灰復燃者即曰膿泄已多正氣須顧要之精神已餒厚膩必所不勝礙胃減食尤多變幻彼治傷寒大病善後之法知能清養和胃者必是傷寒名家而治瘍科潰後調理之時能守輕清養胃者亦是瘍醫老手惟膿去痛定之後余腫漸消胃氣既旺則鮮豬白肉在所不禁以豬為水畜味本鹹寒亦有化熱化毒功用燉取清湯可養胃陰以助津液血肉有情竹破竹補正是瘍家應需妙品不比傷寒初越嫌其膩滯未可遽食也第十二節論瘍科通用丸散治瘍之有丸散尚矣千金外臺已開其例有舉莫廢至今沿之蓋取其服法簡易用以治尋常之證可代煎劑之繁瑣耳然既為普通性質則泛治百病必不能絲絲入扣惟大旨以行氣通絡活血解毒為主要亦不背於理近今俗尚所通行者以王氏外科全生集之醒消丸小金丹等為最著而蘇滬市肆之六神丸尤為赫赫有名幾為婦孺咸知莫不以為外瘍必需之要藥實則王林屋所用之方已是呆笨不靈實效甚鮮若所謂六神丸者則彙集重價之品一陶同治其值兼金非不寶貴然試按之性情效力亦可嘗有切合之影響縱曰珠黃解毒腦麝宣通意亦猶是究竟一金之值買得幾何少服則力量甚微多服則可破中人之産費而不惠最是可嗤壽頤治瘍稟承先師朱氏家學既以煎劑為之主本無取於祕製丸散欺人炫世惟輕淺之病授以丸子亦可有功則簡而易行尚不失利物濟人之志而大證用作輔佐又可以助煎劑之不逮交相為用自不可少茲録習用之品公之同好固各有其實在之效力非市上之泛而不切者所可等視惟病情既隨時而變遷則服法亦必與為推移量度輕重必謂製成丸散呆守板法而可以無投不利則固理之所必無者也第十三節論外治之藥瘡瘍為病發見於外外治藥物尤為重要凡輕淺之證專恃外治固可以收全功而危險大瘍尤必賴外治得宜交互為用此瘍醫之學雖曰理法必本於治內煎劑是其基礎而薄貼末子洗滌等事允為專門學術非研究有素閲歷深而細心體會者亦不能悟徹此中神化也壽頤讀古今治瘍各書外治諸法亦既汗牛充棟而按其實在之效力未可盡信於此始知徐洄溪謂治瘍必有祕授之説為不虛可知此公之於此道自有家法淵源獨惜其所著之書引而不發不肯將此中祕旨宣布一二以告後學蓋猶有吝惜之意足見閉關時代習俗誤人以此老之學識宏通而尚有祕之一字在其胸中得毋所見猶小然所學不傳亦頗為此老惜之頤嘗謂吾國醫學未必無出人意表之妙而向來奉為家祕不肯告人因而輾轉失傳埋沒不少此道不揚亦正坐此然又嘗謂所學果精方藥果效亦何必祕凡深藏而不露者即其學問不可告人之處壽頤承師門之學經治驗而來未嘗非世俗之所謂祕授竊以為可以救人苦難可以闡揚學識民胞物與即在此中請傾筐倒篋而出之以與同志共為肄習藥不必貴而奇惟在適用而有實效是固正直蕩平之道人人之所能知能行者雖只寥寥無幾然已足以泛應而有餘果能神而明之化而裁之竊謂向來各家祕鑰不肯示人者或亦無以過此
