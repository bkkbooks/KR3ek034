body:
  text: 卷下第四章膏丹丸散各方第一節退毒丸藥方蟾酥退毒丸治瘍患初起不論大小各證陰發陽發宣通經絡行氣活血消散退腫解毒定痛如神惟頭面疔毒忌之制香附西羌活全當歸川斷肉各三兩生遠志肉二兩明腰黃白明礬各一兩廣地龍去淨泥垢炒鬆弗焦六兩穿山甲片炙透藏紅花上麒麟竭鴨嘴膽礬各五錢滴乳香淨沒藥去油淨各八錢真輕粉淨者二錢上西牛黃大梅花冰片當門麝香各三錢以上各為細末和勻另用真杜蟾酥二兩六錢汾酒浸化同杵丸如緑豆大辰砂為衣小證每服分許大證須服一錢至一錢五分如初起痠痛堅腫能飲酒者用熱黃酒吞丸不能飲酒者當歸木香煎湯送服須囫圇吞不可嚼碎如腫痛已甚勢欲釀膿者亦可服但稍減之即膿成後四圍余塊尚堅者亦可服以消盡堅腫為度方解外科之有蟾酥退毒丸舊矣然其方頗雜殊未易效此黃牆朱氏改定之方家傳五世治瘍頗負時名消毒退腫以此丸為必要之藥輕證則三丸五丸大證則重用之壽頤於庚戌八月在滬上治一婦人腰疽大痛形已高突背脊酸楚異常勢有蒸膿之狀知是大證可危授以是丸約三錢許囑分三服用熱陳酒吞每日一服不意此人並作一次服之且飲酒不少黃昏吞藥至夜半大熱如焚本有身熱但不甚熾神志迷濛幾至不識人事家人大慌黎旦叩門來詢並約速速赴診頤初不知其故亦為疑訝逮稍遲數刻早膳畢即往視之則熱已大退神志已清自説背痛鋭減轉側輕捷再與宣通煎劑不勞更方而愈可見是藥效力之神藥不瞑眩厥疾不瘳是之謂乎牛黃丸治風熱痰壅痄腮發頤時毒痰核瘰癧及咽喉腫痛腐爛肺癰胃癰咯吐膿血諸證上品陳膽南星十兩天竺黃四兩川古勇黃連廣鬱金五倍子烏芋粉各三兩象山貝母六兩關西牛黃五錢透明腰黃二兩以上各為極細末以好黃酒化陳膽星杵和為丸如大豆辰砂為衣密收弗透空氣弗用石灰同藏每服三五七丸細嚼緩咽下方解此丸主治各證無一非風熱結痰凝聚不化方中清熱解毒開泄痰壅重在清降而獨無疏風之藥以病有始傳未傳之別初病固當泄風若在數日之後熱痰內結而兼用風藥反以煽動痰熱助之上揚必有流弊此制方之深意非缺點也五倍之澀亦以火焰方張防其四散走竄丸子之與煎劑所以不同之處亦在此若以五倍用入煎藥即是大謬消疔丸治療瘡大毒火焰方張大便不行者用之地道一通其勢自緩明雄黃一兩生錦紋二兩巴豆霜揀取白肉紙色壓去油塗四兩以上三味各為細末少加飛面五六錢米醋同杵為丸如鳳仙子大每服五丸至七丸最重證不過十二丸不可多用溫開水吞泄一二次預備緑豆清湯冷飲數口即止虛人孕婦勿用小兒痰食實證發熱大便不通者每用二三丸杵細飼之泄一次即愈方解疔毒皆實熱證地道壅塞是以火焰上凌其毒益熾是方即仲景備急丸之變法惟恐承氣猶嫌不逮乃以巴霜之迅疾峻利者速之下行以奪其上逆之勢證重藥猛針鋒相對小兒亦可用之者惟其大實大壅故可下奪且所服無多不嫌其厲京都有盛行之保赤散即是巴霜硃砂世皆知其有功而不識中是何物若使明告以方當無不駭為可怪須知每服不過一釐自不為害但不可頻用以傷脾胃耳近年滬上某兒醫亦自制有幼科通治之某某丹頤曾見其藥色亦微紅當即是京都之物某君於幼科頗負時名經驗已富而亦用此當可知是藥之不致貽禍矣鐵掃丸治脘痛腹痛痞結堅塊將為肚癰腸癰者力能消腫定痛奏效甚捷腹痛腹脹凡是實證雖無痞塊者亦佳莎根香附子生玄胡索弗炒各一兩五錢草烏廣木香桃仁各一兩川厚朴陳皮青皮各八錢乳香沒藥去油淨各六錢原麝香三錢各取細末煎糯米濃漿打和丸每丸重約錢許每料作一百大丸辰砂為衣每服一二丸臨用打碎為小塊溫陳酒吞服弗嚼細不能飲者砂仁湯下妊身忌服小兒酌減方解脘痛腹痛以致痞結有形釀為瘍患無非氣滯血凝治之之法活血行氣宣通結滯已無餘義但病在皮裡膜外者最多湯藥蕩滌急則徒傷腸胃不達病所緩則病重藥輕亦復無濟內服煎劑恆以桃仁承氣為主時亦有效而不甚捷其弊在此朱氏是方丸以緩治能直達下焦留連以宣通之所以投之輒應作為大丸者欲其久藏而香氣不泄打作小塊吞咽者欲其緩緩消化方能達到腸間猶有力量以及患所丸以米飲取其黏結而不速化制方之意極精皆不可忽略看過沉香散治停寒積飲肝胃氣痛痞結脹滿嘔逆酸水痰涎諸證亦治寒中霍亂上吐下瀉心腹絞痛厥逆脈微欲絶者天台烏藥六兩北細辛四兩淡吳萸一兩五錢川古勇黃連四錢廣新會皮五兩廣木香廣鬱金紫降香製半夏各三兩黑沉香上重者水磨細末日乾弗烘一兩各為細末和勻每服一錢至二錢開水調吞方解肝胃氣痛而至痞結脹滿寒痰凝結者為多即嘔吐清水酸水亦是中陽無權飲積不化於法必當溫運此與肚癰腸癰相去亦只一間但癰多鬱熱溫藥未可概投此則以痛為主非溫辛不能開痹雖間亦有肝陽鬱結不利溫燥之證然大痛之時每多發冷畏寒甚者且冷汗淋漓授以此散往往桴應惟當痛勢既定之後必須峻養肝陰方為培本正策耳附新方九痛丸治宿年九種胃痛如刀如椎絞結胸腹腸胃之證無不神應白川椒公丁香高良薑廣木香明腰黃江子仁即巴豆揀取白仁壓淨油質各一兩五靈脂八錢西藏紅花六錢各為極細末用汾酒泛丸如緑豆大不可蜜丸每服七釐溫汾酒一杯吞服泄一二次飲冷粥湯一二口即止定痛極驗重者不過三付有年久恙可剗根株方解此吾鄉某氏年施送之藥遠近來索都稱捷驗頤索得其方溫下以除痼陰沍寒而所服甚少製藥有度洵是良方但刈絶根株之後必當滋養肝脾善調其本否則正氣益耗再發當劇不可不慮薈黃二仁丸治梅毒下疳淋漓陰𧈟諸證真陰已虛不任攻伐者老色蘆薈五錢真淨輕粉三錢關西牛黃二錢桃仁杏仁去皮各三十粒明淨腰雄黃四錢以上為細末打和丸如緑豆大壯者每服一錢至二錢弱者減之以鮮生地仙遺糧銀花三味煎湯送下即以此三味常服代茶方解梅毒一證非蕩滌不為功然毒焰囂張真陰已薄一路攻削亦所不勝況毒在血絡徒伐腸胃亦且不中病所此方丸以緩治威而不猛無太過之弊其用輕粉者惟此能祛絡脈之毒主藥在是淺者視之每謂汞是劫毒最防收入骨髓轉滋變幻不知江湖術士專事升汞以治此證倒提深入害固不可勝言其咎在用之太多而又不以清解輔之二三日間梅瘡盡伏其效如神而毒得汞力伏藏於內遲之又久然後發泄則橫決淫溢不可復製此方汞尚不多而牛黃腰黃即以解此猛烈之毒更用蘆薈二仁導之使泄已無伏藏之慮且又有湯引清利通溲二陰皆有去路配合自有法度朱閬師主治毒門必以是丸為主投之輒應頤見已多惟效果稍緩不能剋日成功則王者之師固不如雜霸之君必責效於旦夕試觀東西醫學於此一科內服外治無不用汞又有以白檀香油治淋濁者亦必每丸中稍稍入三仙丹半釐許取效亦極敏捷以此知汞固毒門中之無上神丹也若服之過度則齦浮齒痛即是汞毒發見之證是宜停藥而大清其胃惟此丸則萬無斯弊不必過慮若能採得鮮仙遺糧白色者紅色者不入藥用數十百斤杵碎熬取濃汁如膏日常代茶尤多尤妙毒門聖藥大有效驗而無流弊海金砂丸治淋濁不論新久皆效真川黃柏研細末淨海金砂二味等分以鮮豬脊髓去皮只用髓質生打和丸日乾每服二三錢淡鹽湯吞方解赤白濁是精竅病溲淋結澀疼痛雖似溺竅病然血淋膏淋流血流脂亦未嘗不是精竅病與奇經甚有關係但知清熱利水必無速效是方用柏皮海金砂盡人所能而以豬脊髓和丸從奇經著想竹破竹補大有巧思宜其投之輒應重定兒科萬應錠治小兒停痰積熱發熱不退大便不爽亦治溫熱病胃腸實熱斑疹丹痧及暑濕痰熱赤白滯下實熱便閉婦女血熱瘀垢月事不調瘍科瘰癧痰核時毒發頤痄腮溫毒實熱咽喉腫爛乳蛾喉疳喉痹喉癬牙疳舌疳口糜重舌暑天熱癤諸證真陳上好膽南星生錦紋老色天竺黃紅芽大戟千金子霜去淨油生玄胡索象貝母川古勇黃連仙露半夏明天麻建神麯各三兩毛慈菰陳京墨各四兩胡黃連二兩麒麟竭明淨腰黃真熊膽各一兩五錢當門麝香大梅片各三錢以上各為極細末糯米飲杵為錠不拘大小臨用磨服大人四五分至一錢小兒減之隨證酌量妊身弗服腫瘍亦可磨敷方解萬應錠者京師最有名之小兒通用藥也杵丸如小棗核金箔為衣故俗稱金老鼠屎治小兒身熱嘔吐不食不便者極效藥多清熱通腑以兒病實火居多停乳積食生痰生熱變生百病苟非久瀉傷脾無往而不為實證錢仲陽兒科聖手試讀其小兒藥證直訣百數十方消導清熱者十之八九用巴霜牽牛大黃者不一而足不明此理能不駭然抑知小兒服藥最是無多如用尋常草木則幾微之藥有何功力惟猛烈者苟得數釐下咽已能蕩滌垢穢消融渣滓不須再服而已奏膚功此正是古人之識力獨到處此錠清熱解毒消食導滯活血行氣力量雄厚且不用巴霜尤其穩妥但原方尚少痰藥嫌未盡善甲寅初冬頤偶向吾師閬仙先生談及先生謂可合用玉樞丹法當損為之因除原方之乳沒以既有腦麝則無取乎疊床架屋且膚庸之藥本無足重又去自然銅以金石礦質太嫌猛厲幼孩臟腑柔脆不能勝任且亦非必需之物加入膽星竺黃大戟毛菰千金霜腰黃以成是方則小兒實熱無往不宜抑且解毒化痰治時邪溫毒溫熱斑疹暑熱痧氣赤白帶下停食結痰氣滯滿悶實熱便閉女科月水不利諸病胥可借用而外科熱毒咽喉腫爛乳蛾舌疳牙疳口糜發頤時毒痄腮聤耳等證亦無不應而後萬應二字名副其實惟原方謂並治疔瘡大毒大人中風小兒急驚諸病則疔瘡忌散內風忌升議去腦麝而加生牡蠣自然粉生石膏各三兩羚角水磨三錢等潛降之品別為一料則完美矣第二節薄貼各方今之膏藥古稱薄貼自退毒消腫以及既潰之後提膿化腐搜毒生肌無不惟薄貼是尚雖另摻末藥各有分寸而膏藥本以藥物合成亦必自有分別不可溫涼寒熱混為一陶市肆中物油質不淨甚且助其化腐固不可概用而瘍醫家自制薄貼亦復只有一種其意以為但當於末藥中分別療治已是各合其宜則薄貼一層亦可不復注意黃牆朱氏備有數種分治寒熱之證實在至不可少頤參觀新學恆謂中醫舊法太嫌黏膩苟其腐化已劇則油紙薄貼不能吸收膿水殊未盡善不如新法用脫脂棉紗較為收濕間嘗採取其法而別以自制藥末分別用之雖不中不西亦中亦西俗子見之不為竊笑於其側者然自謂執其兩端而用其中頗為可取茲亦並及之慧眼人當不致以騎牆派三字妄生非議也清熱薄貼治陽發紅腫及潰後膿水未淨者各以應用末藥摻上用之大生地切薄片一斤全當歸八兩羌活黃芩川柏各三兩玄參苦參甘草各四兩白芷赤芍各二兩錦紋大黃六兩木鱉子一兩以上各為片用真芝麻油二十斤大鍋煮沸先入生地木鱉子熬二十分鐘再入諸藥俟焦枯離火用細布漉去滓淨另入淨鍋文火熬沸乃以篩細廣丹篩細定粉即鉛粉各兩斤許輕輕摻入柳木棍不住手調勻俟起細泡水不可猛猛則沸溢乃滴入冷水中試老嫩以滴在水面凝結不散著手不黏搓之成條為度若太老須用另備之煉成藥油加入同調膏成離火預研血竭腰黃輕粉銀珠各一兩五錢最好再加麝香梅片不拘多少同調勻預以大缸注水乘膏熱時傾入水中浸至半涼時即在水中分作數團約每團一斤許另入甕中清水養之密封候用日久不壞油紙攤貼方解此薄貼能消陽發腫塊清熱解毒無論已潰未潰俱可通用潰後並能生肌收口瘡瘍小癤即貼此膏不必另加摻藥亦無不效惟潰腐巨大者油紙攤膏不吸膿水宜用西法棉紗棉花鋅養油膏再加提膿化腐末子為佳至新肌已滿膿水不多覆蓋此膏即易收口溫煦薄貼治陰發大證形巨腫堅痠痛徹骨皮肉如故者或但骨節酸楚尚無形塊者及肚癰腸癰堅塊深邃等證凡閃傷跌撲風寒濕邪三氣痹著肢節酸癰舉動不利等證皆效鮮鳳仙莖連枝葉花蕊根莖洗淨日曝半乾約二斤大生地六兩當歸鬚四兩急性子五兩大南星三兩川烏草烏乾薑羌活獨活各二兩以上各切片用真麻油十五斤煎沸先入鳳仙莖熬二十分鐘俟不暴再入生地又熬十餘分鐘乃入諸藥煎枯漉淨另入淨鍋文火熬沸入篩淨廣丹篩細定粉約一斤半柳木棍不住手攪極勻滴入水中試老嫩如上法膏成離火預研細麝香五錢乳香沒藥去油各三兩上安桂末丁香末各二兩調勻入水成團藏如上法潰瘍多宜清涼如元氣虛寒潰久不收之證亦宜用此膏攤貼如治跌撲損傷筋骨疼痛及寒濕痹著之證則另加四溫丹和勻攤貼市肆中有通行萬應膏尚不及此搓成丸子捏如餅亦貼風寒頭痛如治陰疽大證亦宜再加四溫丹和勻攤厚膏藥貼之方解唐人已有薄貼之名知膏藥之發明已久瘍證半多濕熱不宜於溫惟亦有陰寒凝結之證則清涼正在所忌而雜病之經絡筋骨肢節間證亦有宜於外治者此溫煦一法正不可少瘍科家有加味太乙膏一方雖可通外瘍惟於陰寒大證尚不貼切敝師門朱氏自定此方專為虛寒及雜病立法既可宣絡活血亦能消腫軟堅適用處正復不少欲治瘍科亦是不可不備之藥成煉藥麻油凡煎煉薄貼必先煉此油漉淨另貯則煎成薄貼有時嫌老可以此油隨意加入如在三冬之月天氣大冷薄貼攤在紙上即不黏手貼於患處極易剝落亦必以此油稍稍和勻攤貼則膏嫩而黏又此油可調藥末敷諸瘡濕爛比用生麻油為佳若以此煉成之油如上法調入黃丹鉛粉即成膏藥亦可貼一切瘍患另加應用藥粉亦可敷衍應酬但不能及上二方之速效耳生地四兩羌活獨活當歸甘草各三兩龜板八兩用麻油二十斤先入龜板後入生地又後入諸藥煮枯去滓候用黃連膏治眼癬漏睛瘡鼻𧈟唇疳乳癬乳疳臍瘡臍漏及肛瘍諸痔莖疳陰蝕等證不能用拔毒去腐三仙等丹者川古勇連川柏皮玄參各四兩大生地生龜板各六兩當歸全三兩以上各切片用麻油五斤文火先煎生地龜板二十分鐘再入諸藥煎枯漉滓淨再上緩火入黃蠟二十兩化勻密收候用方解此膏所治諸證皆在柔嫩肌肉既不能用拔毒薄貼然摻以提毒化腐之藥則倍當其痛且致加劇故制是方清熱解毒亦能去腐生新但必須時常洗滌挹干毒水用之始有速效象皮膏治頑瘡久不收口膿水浸淫浮皮濕癢並不深腐之證若足脛濕臁久年不愈者此膏最佳真象皮三兩無真者則以驢馬剔下之爪甲代之可用四五兩當歸全壯年人發洗淨垢各二兩大生地龜板各四兩真麻油五斤先煎生地龜板象皮後入人發當歸熬枯去滓入黃蠟白礬各六兩川連汁煅制上爐甘石細末半斤生石膏細末五兩文火上調勻弗煎沸瓷器密收油紙攤貼量瘡口大小為度外以布條輕輕纏之二日一換膿水少者三四日一換此膏亦可攤於西法之脫脂棉紗上較用油紙者易於收濕長肉方解多年頑瘡浮皮濕腐以及臁瘡皆最不易速效尋常去毒化腐生肌收口之藥毫不桴應此非血肉有情何能取效故選用象皮人發及驢馬爪甲取其血肉同氣易於黏合此是朱閬師自制之方用之四十餘年極有奇效光緒季年閬師治一奇證是蘇州鄉人年三十餘初起頭頂堅塊漸大漸高不癢不痛亦不頑木相安無事者五年餘乃浮皮漸腐稍有膿水亦不甚痛而眠食起居諸無所苦百里內外醫家幾於遍試莫識何證乃詣蘇垣天賜莊美國醫生柏樂文處就醫柏謂外雖腐而內則大堅若用割法血出必多且內是腦蓋堅塊附著腦蓋骨割之必有流弊宜以腐爛之藥漸漸滲之使蝕去堅塊方可收功而西法則無腐化之藥聞中國治瘍家有腐蝕惡肉之法能不傷好肉汝可訪求中醫之長於外科者請其用藥將滿頭塊硬頑肉漸漸腐脫則余當以西法為汝收口其人乃訪得黃牆治瘍素有聲譽始孥舟來閬師處則外形幾於頭上另有一頭高逾二寸徑三寸有餘其帽搖搖不掩其發使登龍山必效孟生故事視其腐處確在浮皮但有滋水而無膿無血按之則堅如石亦不做痛確不能識是何病抑必不能言其病理若何初亦只用普通化毒之藥無甚進退後病人述柏醫生説乃摻以枯痔散此散即外科正宗舊方但不用天靈蓋方見後果漸漸蝕去堅硬並無痛苦乃放膽用之積半年餘堅硬已盡露出腦蓋完全光滑乾燥之骨四圍毫無余硬直徑至四寸余師謂如此光滑無絲毫肉質雖無變證飲食起居俱如無病潰口亦不流血但微有膿水蓋骨中合縫如犬牙相錯者微微按之稍有稀膿幸毫不痛癢腦中亦不覺有病以腦蓋之骨雖不甚厚而兩面硬骨中夾一層如海絨之質天然生理所以保護腦髓者本極周到所以外皮蝕盡而腦不受傷此證之所以終獲安全者亦在此然收口必難彼美醫柏氏既謂蝕去之後彼能收功姑且令其求治於彼則西法治外素以神妙見稱當必視吾家舊學較易一籌於是囑其再往柏處以踐曩日之約乃不數日而其人又來述見柏之後歷敘一路用藥之法並陳中醫收口必遲請其施展妙腕早竟大功詎柏一見頑肉果盡俯首沉思謂中國醫學確有殊功汝既遇此能手則渠既有此術蝕盡惡腐渠亦必有收口妙藥以成全績固無待余之越俎代庖此亦君子不奪人功之意云云所以復來求治於我公柏醫之言婉轉得體大是善於辭令閬師乃即以此膏與之復於四圍接連皮肉處加用生肌藥末初則漸漸有新肉絲絲逐次蔓延骨上而四旁緩緩收縮但巔頂光滑之骨如故積一年許收至闊二寸余前後尚三寸許則常貼此膏而絲絲之新肉不復上延更摻生肌藥粉亦復不應授以補劑內服又隔多時形仍如故師乃謂此正頂光骨歷久不收藥力無效則欲收全績殆以難之而病者必再四相問是否別有法子雖費稍巨尚可勉辦師因憶及古人有天靈蓋入藥一層意此證部位相合或能收效乃告以此證有此一法但擾及枯骨天良説不過去理所必不忍為無已則試以狗骨代之當能有濟又閲數日其人竟持片骨來請以合藥乃烘焦以和入生肌末藥中囑摻在四周仍以此膏蓋之竟漸以漲滿甫二三月而全功就緒初則新肌光滑不能生髮遲至年餘乃新發漸布不復如牛山之濯濯此人往來於黃牆村上者前後凡三年餘儼如舊友頤至師處曾三四見之厥後病愈而歲時饋問不絶此是大奇之證雖不能洞囑病機説明真相而前後治驗確有可傳此膏之效亦可概見爰為追述始末附識簡端可見吾師家法淵源固自有加人一等者黃牆醫學洵非浪得虛譽云爾鋅氧油膏治大毒巨腐膿水甚多及濕臁頑瘡淹久不收等證鋅氧粉凡士林杵勻成膏以脫脂棉紗量瘡口大小攤膏貼之棉紗背後須襯脫脂棉花薄薄一層膿水多者一日再易此膏無黏性須以脫脂棉紗長條輕輕纏之方解大毒腐化已劇舊法薄貼黏力太富既不能收濕吸膿而又罨滿瘡口閉塞毒氣頗有流弊甚至遏抑熱度穢臭難堪西法是膏其力量不過保護瘡口使不受空氣侵襲免染菌毒初無化毒化腐效果治彼之學者固無不以此為恆用之品而萬病一律太嫌呆板功效殊不足言然棉紗棉花吸收膿水能令瘡口潔淨不生穢氣是其所長可以補舊法薄貼之未逮頤借用其長以治腐爛數寸之大瘍即以舊法應用化毒化腐生肌收口未子量度用之既能吸盡膿水使瘡口潔淨而復有化毒去腐之能力庶幾互濟其美呈功尤速惟膏無黏性不得不用纏扎之法然纏之不可太厚扎之不可太緊方能氣血貫通生肌迅速而治彼之學者只知纏扎嚴密重量固護甚者且雜以棉花包裹豐厚陽發熱毒反以助其鬱蒸腐爛益甚則有良法而不善用之適以為害試觀病人之從醫院出者患處如被重裘十人而九用其法而不悟其意為利為弊未有不得其反者是亦可以深長思矣樟丹油膏治遊風濕注黃水瘡膿窩瘡等膿水浸淫癢不可耐者鋅氧粉東丹凡士林樟冰量加同杵勻成膏樟冰份量須視癢之輕重酌量成分太多則痛太少則病重藥輕亦復無效此等證膿水極多濕熱之毒甚厲膿水浸淫所及即令癢瘙蔓延四散分竄並可傳染他人不可不洗滌淨盡挹干膿水再塗此膏瘡重者亦用棉紗輕輕纏之一日一洗換方解此又不中不西亦中亦西之用法舊治癢瘡末藥洗藥之方已極豐富驗者亦多不勝書頤定此法既極簡易而又極效得此則一切舊方皆可廢十年來只用此方已是無投不利取其修合最便故也水楊油膏癢瘡之輕者宜此膏鋅氧粉凡士林水楊酸用如上法方解水楊酸亦西藥收濕止癢蓋亦樟冰同等之性而無氣臭較之樟冰則和平而淡泊輕證可用癢重者不足恃第三節退毒膏丹瘍患堅腫初起可退雖以內服煎劑為主而外治藥末必不可少朱氏成法簡而易行但分陰陽二證度量輕重已是無往不宜可謂指南之車金針度世也四溫丹治癰疽初起不論深淺大小皆可用上瑤桂去粗皮二兩北細辛去淨泥垢一兩乾薑八錢公丁香五錢各為細末小證每用二三分上用溫煦薄貼蓋之大證則用三五錢調入溫煦薄貼料中攤貼或再加麝香分許方解此腫瘍初起形巨塊堅者通用之藥凡痠痛漫腫深在肉裡附著骨節者溫通氣血是其特長並可療風寒濕邪三氣痹著肢酸經掣及跌僕暗傷等證但陽發風火痰熱及暑天熱癤初起時形塊雖堅者弗用千捶膏治癰瘍高腫將欲成膿及陽發初起來勢迅速者又乳瘍乳發胸臂腹皮諸癰內挾肝膽相火不能用四溫丹及溫煦薄貼者宜以此膏黏於清涼薄貼上用之未成可消已成即提膿高腫易於針潰捷驗異常萆麻子去殼取淨白肉一斤大天南臘月牛膽汁制透六錢乳香沒藥制去油各三兩急性子一兩銀硃血竭各二兩上好麝香三錢以上先以萆麻子置石臼中捶極細綿稠如醬乃入後七味俱各先研細末緩緩杵勻瓷器密收聽用方解此方以萆麻為君銀硃急性子等為佐消腫退毒捷於影響陽發瘍患初起貼之消者八九恆有一貼此膏而腫塊即退移於膏藥之旁者以此知是膏並可作移毒用古書稱萆麻能墮胎云云亦以其流動而過甚言之然壽頤習用此膏即孕婦癰瘍皆不避忌確未有因此墮胎者以此知古説之未可盡信亦猶古今本草皆云凡食萆麻者一生不可食大豆犯此忌者必脹死而壽頤在七八齡時有人贈此種子云是外國豆蒔之後圃秋收輒數十斤炒熟之闔家作為消間食品者凡六七年不知是萆麻子亦不知忌食豆也然全家幸未嘗一病逮弱冠時始知向之所謂外國豆者原來即是萆麻之俗名又其後研究醫藥乃見有忌豆之説於是悟到凡百醫書大都人云亦云未必皆為確論姑附識於此以見此物之真後有君子欲於醫藥中求實在效力不可不從經驗閲歷四字上有一番精細工夫若彼此懵懵徒於故紙堆中尋生活亦安往而不誤己誤人也耶獨聖散消堅腫定痠痛陰寒之證甚效急性子一味研末隨證大小酌用熱陳酒調敷患處外用溫煦薄貼蓋之或調入溫煦薄貼作厚膏藥貼亦佳方解急性子性最激烈內服催生墮胎其效甚迅以作外治宜其通經入絡散腫定痛捷於影響此壽頤以意為之試用頗應命名獨聖允無愧色碘酒治暑瘍熱癤小證初起能消堅塊止痛此酒色如醬油耳食者皆謂西法醬油藥水可以消毒即此碘片一錢五分火酒四兩此藥入酒即化用時以毛筆蘸酒塗患處一抹即干不可頻搽須隔五六小時再搽一次肌膚小癤自能消散如搽之太過即令外皮腐爛滋水侵淫反以貽害方解此西法也西學家亦以為普通用品然碘片之力極厲貯入瓷瓶中如以木塞口則其木不三五日即黑腐如泥如攤於木器上木器頃刻焦黑等於炙炭故浸酒用之自能深入肌腠以消堅塊但藥性自外而入幾如硝鏹性質頻頻用之即令肌膚髮腐而內之堅塊如故所以只能治小小之癤淺在皮里方能有效若腫塊稍深則藥力亦不及病所縱使外皮腐爛亦不能消其堅腫恆見有並以治瘰癧痰核深藏經絡之證則未見其利只見其弊是不知於藥物性質上體會研究者也第四節退毒敷藥瘍患初起其有形塊者但貼退消膏藥已是適用而漫腫無垠不辨根腳者則薄貼即無所用之此惟末子敷藥可以遍塗患處使之收束其輕者亦可消散市肆中有如意金黃散一種未嘗普通習用之品瘍醫書中無不載之然藥味尚未免稍雜輕證可效重大者頗嫌不勝其任且只此一方而以通治寒熱虛實總嫌籠統不切徐洄溪所謂一證有一證切要之藥非通套方劑可以奏效云云固亦有見於此然必每證各備敷藥亦太繁瑣此老蓋未免大言欺人敝師門朱氏分溫涼兩種如薄貼之例亦已無施不可簡而能賅是可法也溫煦丹如意金黃散宜於陽熱而不利於陰寒凡病在筋骨先痠痛而後堅硬漫腫者金黃散必不可用黃牆朱氏數世研究深知其弊業師閬仙先生因訂此方以治附骨環跳等證初起隱隱痛楚漸至成塊木腫者其效最捷並治跌僕損傷筋骨掣痛皆效炒香附四兩西羌活川獨活上安桂去枯皮生南星北細辛各三兩粉甘草四兩川烏草烏高良薑各二兩公丁香一兩急性子五兩各取極細淨末和勻臨用時以無灰酒加連根蔥三五莖煎沸調藥熱敷患處絹包裹一日再易寒甚者合四溫丹等分用桃花丹此則如意金黃散之變法金黃散性偏寒涼惟赤腫大熱者為宜若初起肌肉腫痛猶未發赤雖曰亦是陽證但氣滯血凝藥宜疏通乃可消散遽以大涼之藥遏郁之則氣血堅凝反不可散是逼其團結蘊釀成膿適以助之成潰伊誰之咎治此者縱不可用溫藥助虐亦必以通絡泄散為唯一祕訣閬仙朱先生手訂是方清涼而不偏於陰寒散腫軟堅疏泄鬱熱以治陽發紅腫焮熱或尚未高腫色赤乳癰疔毒漫腫堅硬者無不應手捷效其功實在金黃散之上羌活當歸甘草各三兩陳皮黃柏大黃急性子各二兩南星白芷赤芍各一兩五錢馬牙硝銀硃各一兩緑豆粉四兩以上取細末和勻密收紅腫焮熱者以忍冬藤杵自然汁調敷大青葉芙蓉葉馬蘭頭馬齒莧等自然汁皆可用時毒發頤用防風三錢薄荷葉二錢煎湯調敷或加薄荷油十許滴小證紅腫用茶清調小塊初起以藥末三四分用太乙膏貼之陽證初起未紅未熱以甘草煎湯乘熱調敷第五節圍毒移毒鐵井闌凡癰疽大毒漫腫無垠根腳四散其毒不聚最是惡候難消難發遲延日久必多變幻故收束瘡根一法至不可少又有瘡發於骨節轉側之間釀膿化腐恐礙關節亦宜外敷移毒末子使其移至一偏讓開要害則縱使成膿可免損及運動古法此類方藥亦頗不鮮而效者寥寥此是朱氏恆用之藥較古書成文為效迅速是收束瘡根必要之品外科書中別有此名用芙蓉葉蒼耳草二物搗塗只用以治熱癤輕證非此方可比大五倍子去蛀屑微炒成團候冷研細三兩杜蟾酥乾研細五錢藤黃三兩先以好醋入銅杓上微火化煬絹漉去滓聽用明礬一兩研膽礬八錢研大黃皂角白芨山慈菰各三兩制南星一兩以上先以後五物用陳米好醋二大碗文火熬濃絞去滓乃和入醋煮之藤黃同熬成膏俟極濃乃和入五倍子蟾酥二礬細末調勻離火再入上麝香細末三錢杵勻製成錠子陰乾收藏臨用時以醋磨濃塗瘡根四圍干則潤之以醋一日洗去再塗極效欲移毒使偏則如上法塗其一偏而塗藥處自能退腫其毒聚於未塗藥之一偏矣可保骨節不致損害是即避重就輕之法第六節化腐搜毒收濕止癢諸方三仙丹此即升丹一切潰瘍皆可通用拔毒提膿最為應驗凡尋常之證得此已足但濕瘡有水無膿及頑證惡腐不脫或起缸口或黑腐黏韌久潰敗瘍則別有應用藥末非此可愈凡潰瘍近口近目處弗用乳頭臍中陰𧈟下疳弗用水銀火硝枯礬各一兩先將硝礬研細入鍋底按平用小鐵鍋中作凹形坐入水銀揀一平口渾圓瓷海碗覆之須口與鍋密切無纖微隙縫以棉紙作線條浸鹽水護碗口細細築實試上爐用小火烘之聽碗中微有聲息知硝礬自溶看碗口無黃紫氣飛出方不走爐一見碗口出煙汞已外泄再用棉紙條築之乃用黃沙蓋在碗上全碗埋沒沙中碗底納入棉花一小塊上加大鐵一塊壓之乃加炭一爐令火徐徐加大一爐炭約二十兩一爐炭燼再加滿一爐猛火煅之兩爐煅燼乃撥開碗底之沙驗得所藏棉花焦黑成炭火候已足乃移下鐵鍋置於干磚上冷定最好要隔一宿開看碗中滿黏鮮紅一片而鍋底只有白色藥底最為佳候碗中之藥面上一層輕浮如粉先用雞翎掃下別貯此藥性薄只有輕證可用掃盡浮藥則碗上更有黏住一層以黏住一層以刀刮取厚者成片此藥力量較足可治大毒重證入油鉢細細研之極細乃可用藥色以鮮紅如朱明豔如赤霞者最為火候得中若不及則色黃且有淡黃色即市肆中之所謂黃升藥力量最薄不可用且火候未到汞性未化多見空氣則星星可辨仍是水銀以之摻入潰爛之處為禍甚矣若火候太過則其色焦紫或如醬色亦不可用間有滿碗如暈一圈鮮紅一圈深黃一圈青紫圈圈異色者則爐火之作用古人所謂藥爐中自有神妙不測之理確是不可多見者實在功效亦同如偶遇之可各色掃開分別貯之以資博物總之顏色以鮮紅明豔為第一亦偶有晦滯者是為壞藥若上火時有煙騰出則其汞已走碗中可以一毫不存不可不慎炭要預先揀取有聲如銅者方可合用劣炭不可用火候不佳藥力不及功用必有不逮市肆中有煉成者嘗試用之病者皆嫌作痛而自制者則不痛此必有故俗謂陳久不痛新煉者則痛殊不盡然頤嘗以新煉之丹試用亦未作痛但研必極細用此只用新棉花蘸此藥末輕輕彈上薄貼只見薄薄深黃色已足如多用之則大痛矣門外人見之必謂吝惜藥末不肯重用而不知此丹力量甚厚必不可多乎煉丹時爐中所餘白色爐底亦可研細和入疥瘡奇癢藥中但枯礬收濕止癢重用作痛宜稍稍用之拔疔散治疔瘡初起一粒形如粟米頂白無根初覺頑木或則微癢最是惡證勢必腫散腐開其毒甚熾非三仙所能治則需此散先用針當頭點破半分許稍稍見血乃用此藥少許摻於瘡頭上以清涼薄貼蓋之一日再換能束腫提膿並能提出腐肉一塊其韌異常俗謂之疔頭此腐一脫大證皆平是神丹也腦疽發背及其他頑瘡苟有堅韌或黏如筋或黑而臭牽連好肉鑷之不去皆可以此散輕輕摻在惡肉上亦能速之使脫但必預護新肌弗沾此藥斑蝥七枚糯米拌炒黃去米弗用此米大毒宜埋土中全蠍漂淡土拌炒乾三枚玄參炒鬆弗焦三錢爪兒血竭研細去粗硬塊三錢乳香沒藥各一錢取淨末上梅片上麝香各六分各為細末和勻密藏此方加重斑蝥全蠍各三倍另為一料治代指初起腫痛無頭用藥一二分貼於痛處以膏蓋之輕者可退重者提出速成可不化大咽喉痛者以此藥少許貼於頸外相近痛處上以膏蓋一周時揭去皮有水泡銀簪挑破泄去毒水喉痛即瘥近有刊送咽喉異功散者即是此方其應神速黑虎丹此藥名各處通行然藥各不同此則朱氏家傳大有經驗者也治大證頑毒三仙丹不能治與拔疔散功相近而提取膿水威而不猛大約腐肉不脫利於拔疔並無惡肉而膿水頻仍經久不愈則宜此丹全蠍制同上方七枚蜈蚣炙大者七條蜘蛛炙大者七個甲片炙七片白殭蠶炙七條磁石煅研一錢丁香各一錢上西牛黃二錢上麝香一錢梅花冰片二錢百草霜淨者五錢各為極細末和勻瓷瓶密貯每用少許摻瘡口上以薄貼蓋之凡虛寒瘍患潰久不斂及潰後陽虛惡腐不脫者亦摻此丹功在三仙丹之上五虎拔毒丹治潰瘍毒盛非三仙丹所能提毒化腐者露蜂房有子者佳瓦上煅炭蟬蛻蜈蚣各二錢炒炭全壁虎十枚炒炭三仙丹五錢明腰黃四錢元寸五分研細和勻用如上法方解此亦上方之變法大毒頑證必以此二方為主始能有效但黑虎丹利於虛寒之證濕熱病忌之此方則陽發亦可用二方微有分別天仙丹治疔毒及腦疽背疽腹皮大癰潰後膿多或腐肉不脫此藥提膿拔毒能去惡腐而不痛不猛最為王道且收捷效三仙大紅升丹須自煉者為佳二兩天仙子六兩研極細五虎拔毒丹一兩上梅片三錢各研極細和勻密貯臨用挹盡膿水須以一百倍石炭酸淋洗淨棉紙挹干以此末子細細摻遍瘡口以膏蓋之一日兩換吸盡膿腐不傷好肉不覺痛苦最為穩妥而收奇效真是神丹方解廣東藥市有所謂天仙子者其形小圓而扁其色深黃光澤滑潤一得水濕則自有黏質稠如膠漿以治潰瘍吸取膿水其力頗峻尋常瘡癤嫌其吸力太富反覺痛苦惟疔瘡膿多及腦疽背瘡腹皮癰等大證腐化已劇膿水甚多者以此提膿吸毒去腐極易並不苦痛考本草綱目有莨菪子一名天仙子而所載形色性情實非此藥或粵省所獨有未入本草之物頤用之有年恃為利器爰合以三仙丹數味配為一種末子專治大毒大腐是新方之適宜於實用者即以粵東之名名是方以旌其功允足當佳名而無愧色集仙丹三仙丹提毒化腐性頗和平不獨膿毒未清惡腐不脫者賴以化毒去腐即至膿水淨盡新肌盎然亦可稍稍用之即以生肌收口但金石之性藉爐火升煉而成功最捷而吸力亦富全在研之極細摻之極勻若撲藥太重即能作痛恆有病家知是神丹索藥自摻往往不知分量用之太多反以貽害又不容靳而不豫致貽吝惜之譏乃為彙集中正和平之品俾與三仙並行不悖既有提膿拔毒之效復無多用當痛之虞是亦無法之法命名集仙以志其實大紅三仙升丹一兩明淨腰黃二兩生漂牡蠣粉一兩飛淨生石膏四兩廣丹一兩飛滑石三兩各為細末和勻聽用摻入瘡口不妨略多持以贈人庶可聽其自用三靈丹治瘡瘍久潰流水不已不能收口者生青龍齒麒麟竭明腰黃炙龜板各一兩紅升丹海碘仿各五錢各自研極細和勻加大梅片五錢密貯方解海碘仿西名沃度仿漠乃西藥外瘍通用之藥色黃而氣惡有奇臭俗名黃臭藥最能燥濕吸水潰瘍流水者尤為相宜以合升黃龍麟玄武既能吸盡膿水即可生肌收口計日呈功八仙丹治大瘍潰後膿毒漸衰以此搜淨餘毒即以生新明腰黃五錢上血竭四錢真輕粉二錢炒東丹二錢漂牡蠣粉六錢紅升丹二錢元寸四分梅冰一錢各研極細和勻聽用蛇床子散治禿瘡疥瘡濕注遊風搔癢水多者皆效先洗淨而用之蛇床子炒研一斤煙膠八兩白明礬枯礬各一兩大楓子仁半斤白者硫黃二兩銅緑一兩雄黃五兩川椒一兩去目以上各為細末另研楓子仁漸漸以諸藥末和之研極勻每一兩加樟冰二錢癢瘡成片者麻油調干癢者乾擦之每日洗淨然後敷此爐甘丹下疳等證不能用三仙丹者此方能拔毒而不痛上爐甘石最細膩者煅黃連湯淬三四次揀淨研細水飛漂二兩上血竭五錢海螵蛸去背五錢真輕粉四錢烏芋粉二兩漂牡蠣粉一兩各研極細和勻密貯二龍丹治下疳消毒退腫長肉生肌龍衣大者兩條紙吹火燒灰龍骨五錢鵝管石海螵蛸煅爐甘石制飛各四錢烏芋粉一兩冰片三錢各為極細末和勻雞子黃熬油調塗血餘膏治惡瘡久不收口及臁瘡多年不收者瘰癧久潰非此不效壯人頭髮豬毛羊毛雞毛鵝毛各洗淨曬乾雞毛鵝毛須去中心硬梗各淨四兩豬板油去膜淨二兩桐油二兩麻油二十兩白川占二兩龍腦香即梅冰片麝香各一錢以上先以三種油入龜板五兩煉二十分鐘再入諸毛灼焦枯離火片刻細絹漉淨滓文火再煮入川占腦麝以飛淨黃丹六兩調成膏油紙攤貼可再加三靈丹摻藥此油煉成亦可稍稍入鋅氧粉同調用西法棉花棉紗攤貼治瘡口多水無膿者更佳枯痔散痔漏惡瘡頑肉死肌腐不脫者不去頑肉不能收口此方能蝕惡肉而不傷好肉方見外科正宗但天靈蓋無用而害及枯骨必非君子之心朱氏不用亦未嘗無捷效也砒霜一兩生白礬二兩輕粉四錢蟾酥二錢先以信礬入鐵鍋碗蓋密煅二炷香冷定取藥細研另研輕粉蟾酥和勻用之烏金膏惡瘡頑肉升丹天仙丹所不能化者以此摻之化腐不痛與上方異曲同工隨宜擇用巴豆白肉一味燒炭壓去油加元寸同研黑龍丹疔毒最多胬肉高突其痛異常塞住瘡口反使膿毒不泄惟此丹能平之如神方出毛達可經驗集真烏梅肉炒炭大熟地燒炭研細加上梅冰十分之二金棗散走馬牙疳外治藥摻之立刻停腐大紅棗去核每嵌白信石如豆大炭火煅過存性煅時起濃煙須避之如有未化信石則去之研細加冰片十分之四輕摻腐處不可吞入腹碘汞膏此西法藥治瘰癧不問已潰未潰皆效碘片二錢先用甘油少許同研化水銀軟膏五錢再合碘同研化加莨菪軟膏四錢凡士林少許同研勻塗之上以涼解薄貼覆蓋玉糊膏治湯火傷極效立能止痛可免腐潰極易收功百試百驗風化石灰清水浸之俟澄清吹去水面上浮衣淨取清水另貯每水一杯加麻油一杯以筷調之百匝如糊即以塗患處拔管方肛瘍成管拔之不易舊有挂線法未必有效朱氏兩方簡而極效非外間所知壁虎尾尖量管之大小剪取一段插入管中拔膿收口極速有尾之五穀蟲漂淨炙焙存性飛面和為條用之亦佳錫灰膏治遠年臁瘡神效紙錠灰篩取極細者東丹冰片豬板油搗勻攤貼獨煉硫疥瘡濕瘡癢者捷效明淨硫黃入鐵鍋文火熔化傾入鹽滷中凝定取出再熔再淬數十次俟硫色深紫為度一味研細熬雞子黃成油調敷先須洗滌淨挹干敷藥每日一洗再敷第七節洗滌諸方外瘍既潰膿水浸淫必以洗滌潔淨為第一要義庶幾毒菌不留方能生新收口否則惡腐不除必多滋蔓而濕癢惡瘡稠黏毒水尤易四竄且必傳染及人為害尤厲古法洗方不少治陽證皆用清熱燥濕解毒之藥治陰證則用流氣活血滋養之品如醫宗金鑑外科心法所録諸方已是盡美盡善用之不竭惟邇來新學大昌治瘍最重防腐消毒於洗滌一門尤其精神所貫注可以去腐可以生新用藥極簡而條理秩然較之吾國舊法既覺便利易行而能確然有效但藥方本猛全在相度輕重恰合分寸太過則非徒無益反以有害茲録涯略以為參用西藥之法加波匿酸洗法加波匿是西語之譯名東人名石炭酸石炭即煤其名為酸者則華語精華之精也藥是冰質遇高熱則融為油以水化之每一份冰可化九分水則為油質再以水化之則十二份水可化油質一份成水然尚是原料以洗潰瘍必以此水加五十倍清水化合可洗腐瘍能令惡腐淨盡不傷好肉不作大痛必以脫脂棉紗輕輕洗滌挹干膿水再貼油膏其癢瘡濕疥遊風濕注濕臁癢甚者則三十倍清水亦可用不可太濃如不滿三十倍則痛甚矣若大證膿水已少腐肉已淨則用一百倍水及八十倍水可也如癢瘡滋水結痂成片黏連不脫則用脫脂棉紗浸入三十倍藥水中帶水貼於瘡上一二刻鐘硬壓即浮再輕輕洗之至新肌漸滿膿水已盡則不可再用此藥當用硼酸水洗乃佳凡用此水洗瘡一日一度不可多洗硼酸洗法此亦西藥亦能解毒防腐而性和平潰瘍輕證用之大證至新肉已生將收口時亦用之下疳陰瘡乳瘍乳癬臁瘡痔瘡莖疳陰囊諸證不可用石炭酸者亦用之喉舌腐爛牙疳口瘡皆以此漱口去穢目赤腫痛淚流多眵及眼癬濕癢紅腐硼酸一兩沸湯十二兩泡化候冷用之輕證亦可加倍用水第八節止血諸方瘍患蝕斷血絡每易溢出鮮血及病人肝陽太旺火毒極熾之時亦多鮮血自流不止其血危險實甚西法必以動脈鉗鉗定動脈則血溢不多而習中醫者不能用則藥物尚矣又如血箭血痣金刃創等亦不可無急救之法茲録簡而效者二方以備家庭之急若古人成方效者亦多抄不勝抄無取其多徒侈篇幅紫金丹治金瘡能止血及瘡瘍流血不已者紫金藤即降香五兩乳香沒藥去油各二兩血竭五倍子炒成團各一兩五錢別研極細和勻每藥末一兩加梅冰三錢再研勻密藏弗泄陳久更佳金刃獨聖丹止血定痛龍眼核剝去黑殼一層炒研極細每一兩加冰片二錢和勻再研密貯第九節生肌諸方生肌收口古方多矣然瘍患當腐盡新生之時大功告成其人自有滋養能力即不用藥亦無虛其不能收口惟偶有正氣太薄不易生肌者則內服補養而外必以藥力助之亦是治瘍者不可不備之法世俗競尚犀黃珍珠貴則貴矣無非醫人斂財之計究之實在效力亦不必金珠瑪瑙茲録恆用數則以與同志揭明真相惟其效而惟其廉恐市醫聞之將搖首咋舌莫明其妙矣十全丹大證毒淨非此不能速斂西血珀五錢明腰黃五錢漂牡蠣粉一兩雞脛骨狗脛骨烘燥研細弗焦枯綿西耆烘燥研細篩去粗末各四錢青龍齒生研五錢烏賊骨六錢紅升丹二錢元寸五分大梅片三錢細研和勻象皮膏朱氏家制生肌收口並治金瘡止血真象皮炒鬆細研五錢真輕粉四錢鋅氧粉黃蠟白占各一兩血竭六錢紫金藤即降香細末密陀僧各一兩細生花龍骨飛八錢梅冰三錢麻油一斤煮沸下陀僧末再煮沸入二蠟溶化離火入諸藥調勻刷棉紙上陰乾候用用時以沸水壺烘煬貼之弗令見火珊瑚粉外瘍毒淨以此收口上血竭五錢赤石脂牡蠣粉漂淨海螵蛸去背殼研細漂淨密陀僧各一兩花龍骨四錢上冰片四錢研細和勻輕摻以清涼薄貼蓋之方解世俗治瘍珠黃之外血珀珊瑚號為八寶無非藉此貴重之名聊以自高聲價究之珊瑚瑪瑙非血肉之質亦復何能有效是方藉此大名似不脫市儈惡習然惟其色不惟其質未能免俗聊復爾爾且此方生肌收口功效昭著比諸珠玉寶貴實無愧色爰錫嘉名亦旌功之曠典也麟龍丹收口藥與上大同飛滑石赤石脂冰片少許成煉珠粉收口宜之毒未淨不可用方解珠粉貴物也壽頤則謂介屬耳但用大塊牡蠣洗淨泥垢杵散清水漂出細粉去其粗滓功與珠粉同而價則十萬之一耳名以珠粉允無愧色豈俗子能知此中功用耶烏芋粉即荸薺俗名地栗用老而多渣者去淨皮搗爛絞汁其滓和水再研絞去滓取汁澄澱為粉清水漂二三次去甜味久藏不變閣眼藥下疳藥功在爐甘石之上亦治潰瘍去腐生肌單用此粉專治目赤翳星胬肉點入目內極有效力毫不痛癢允為實火目病之神丹第十節咽喉口舌諸方咽喉口舌諸證本是內科初非瘍醫界內之事惟不可無外治之藥為之輔佐而晚近內科家多不備此藥物於是此等病家不得不求治於瘍醫之門然究非長於內科理法者必不易治此邇來喉證所以日甚一日幾如疫癘而喪亡枕藉者此中亦有其故況世且有號為專於咽喉一科者間嘗考其學識固亦不過云爾者乎業師朱氏夙備藥物效驗有素茲備録之以廣其傳是亦先閬師利物濟人之素志雖仍是普通習用之品而較之故紙堆中陳陳相因者臨床治驗或尚能較勝一籌也新定加味冰硼散治咽喉痛腐口疳舌瘡牙疳重舌漂人中白三兩老月石二兩薄荷尖二錢梅花冰片五錢明腰黃一兩各為細末和勻牙疳多血加蒲黃炭棗信炭臨時和勻方解此為尋常咽喉口舌通用之藥方以漂淨人中白為主清熱解毒而導之下降最是喉證無上神丹古人非不知用此奈習俗惡其穢氣燒過用之則僅存矸質等於石灰清涼之性變為燥烈為利為害胡可以道里計茲則研細水飛取其浮潔淨者帶水傾出澄澱換水數十次其白如粉無氣無味豈獨喉證所必需亦是口舌之要藥以極賤之物而用之得宜即為良劑古語有云臭腐中自有神奇此物是矣治藥物學者胡可人云亦云不知細心體會耶新定加減錫類散治咽喉腐爛及口疳牙疳舌瘡等證漂淨人中白二兩西牛黃五錢老月石二兩雞爪川連一兩明雄黃一兩五錢真川貝廣鬱金各八錢金余炭即人指甲洗淨炒鬆微焦弗太過研細六錢上梅片四錢各為極細末和勻每用分許點患處極效方解錫類散一方自孟英王氏極推重之乃風行於世然方中象牙屑極難磨細如治之不良則其質甚堅點入患處非徒無益又壁錢亦不易多覓且此蟲頗毒似亦非必要之物先師閬仙先生以意當損重定是方用之多年大有應驗似原方功力亦不過如是但牛黃有數種關西者其價頗貴頤亦嘗以廣東來者試用之效力亦佳而價則視西産為廉似乎實在功用亦未嘗不相等也耳食者聞此得不吒為贋鼎亂真乎然藥物惟求其適效而已本不必專求諸價等連城者如必以貴是尚則胡不方方皆用金玉耶原方本是珍珠師謂即用中白則珠粉亦未必勝之如必欲介類潛陽則牡蠣淨粉鹹寒清熱而質又黏膩能生新肌功力亦在珍珠之上咽喉獨聖散治喉痛紅腫等證極效可以加入上兩方中西瓜霜秋涼後預藏西瓜不大不小者俟過霜降節擇瓜之不壞者頂開小孔挖去瓜肉留薄青瓜皮約一錢厚弗破另以提淨朴硝火硝不用貯滿瓜中即以所開之頂蓋上麻線做絡子絡瓜於中懸簷下透風不見日曬雨淋之處瓜下離一二寸另絡一瓷盆承之過冬至節瓜皮外結霜極厚掃下研細吹喉瓷盆中如有瓜中流出汁水天寒亦結為霜亦可取用瓜中未化出之硝取出留存明年仍以納入瓜中再令成霜新定膽制咽喉藥治風火喉證及口疳舌瘡真小川連一兩條子芩五錢真川柏五錢白殭蠶炙燥三錢漂人中白一兩老月石一兩薄荷葉二錢各為極細末和勻臘月收鮮青魚膽帶膽汁盛藥末線扎挂當風處陰乾去膽皮細研每一膽傾去膽汁一半乃入藥末加指甲炭二錢明腰黃五錢西瓜霜一兩蜒蝣制青梅肉五錢焙燥研每藥末一兩加上梅片一錢和勻密收紅腫腐爛者皆效若但紅腫而未腐者此藥一兩可配枯礬二錢吹之凡喉證用末藥須用銅噴筒輕輕噴之若用細竹管吹之恐受風病變不可不慎附制青梅法鮮青梅子擇肥大者打碎去核每梅肉一斤以食鹽二兩漬之捕活蜒蝣同漬不拘多少多則尤佳漬四五日取梅肉曝乾還入原滷中再漬再曝以汁盡為度去蜒蝣不用焙燥研末密收方解魚膽制咽喉藥其法舊矣此方亦閬師改定清熱滌痰而加以薄荷之辛涼泄風兼顧外感亦是一法虛喉吹藥治陰虛火炎喉痹喉疳喉癬等證兒茶三錢川貝三錢牡蠣粉漂淨八錢西血珀六錢漂人中白五錢蒲黃炭三錢西牛黃二錢梅冰片六分麝香三分各研極細和勻密貯血餘散治陰虛喉癬真血餘炭一錢真坎氣一條漂淨焙炭研血珀五分腰黃二錢花龍骨二錢上梅片四分各為細末和勻吹之壽頤按此方亦可加漂人中白方解陰虛於下陽浮於上氣火泛溢上凌清竅每有咽喉燥痛哽塞音喑等證病源與風熱外乘閉塞喉嗌者絶不相同而其見證亦大有區別蓋痛而乾涸雖哽塞必不腫亦必不紅嗌關內外皆作淡紅色時有紅絲繚繞而已蒂丁雖亦垂長望之只見其燥絶無痰涎盤旋之狀舌亦不紅不膩不黃甚者其人必足冷脈必不浮不大不弦此必不可以疏風清熱消痰治者六味都氣甚則並用附桂桂宜作丸八味湯必涼服惟外用末藥則亦必清涼蓋下元雖是真寒而上焦確有火證故內服之藥可用溫補而外治其上必不能渾作一氣但終與實熱有別此二方皆為虛火之法前方尚是普通喉痛治法但不用苦寒遏抑及滌痰攻克之品而加兒茶之黏滯以助真陰蒲黃之清芬以息浮焰已與實火證治不同後方用血餘坎氣借血肉有情同氣相應顯與實火痰熱者大分徑庭但血餘炭宜自煅為佳市肄中物與川椒同煅者必不可用開關神應散方見齊有堂醫案治急喉風腫痛悶塞痰涎黏閉呼吸欲絶者必效明淨腰黃枯白礬生藜蘆豬牙皂角炒黃弗焦去筋膜各等分各為末和勻密收臨用吹喉此方可治紅腫若已腐者不可用枯礬極痛腫盛欲閉者涼茶調如糊灌之漸能入喉吐出痰即松方解急喉風暴腫痰壅喉關閉塞呼吸不通危在頃刻苟非吐法先開其壅則雖有良藥亦難下咽本事方稀涎散獨用皂角明礬激之使吐法本六朝稀涎干緡湯來源最古取效最神頤二十年前見一幼孩三歲喉痛猝閉呼吸不利痰涎盤旋欲視其喉而舌腫已黏上齶渾合不隙勢極危急恐不及救即以牙皂明礬為末與之囑其勉強納入吐則或有一線生機乃去後不復來視已疑其無望矣後始知其一吐而安不勞再藥齊氏此方加腰黃解毒亦有可取尤在涇金匱翼用白礬巴豆同煨焦赤蜜丸芡實大綿裹納口中近喉處引吐亦佳古法有以巴豆油染紙作紙捻著火吹息納入喉間令油煙氣引吐痰涎者其效尤捷附針刺法喉風閉塞開關為亟稀涎散江子仁油皆是急救之法而針刺尤為捷效古法用三稜針刺兩少商出血而有效有不效惟內關一穴刺三分留四五呼旋針補瀉能使喉塞頓開可納湯飲應驗綦捷又兩合谷毫針深刺須入一寸五分使針頭透過手心勞宮穴頻頻旋轉其針氣自流通亦極桴應此穴取法在虎口上交叉骨間令病者側豎其掌乃以毫針緩緩直下始則輕輕旋轉令深入骨縫中間不可使針頭在掌中透出多留為上時時旋轉之旋之越重則行動極捷開竅通絡無往不宜即猝厥暴死昏不知人皆能應手出聲之刻清醒第十一節耳目諸方磨雲散治眼赤星翳荸薺粉二兩老月石六錢川連湯制細爐甘石一兩冰片三錢各研極細和勻點眼點眼藥水治目赤星翳神效烏梅肉七錢鴨嘴膽礬二錢川椒去目二錢明礬七錢青鹽三錢冰片一錢引綿小針三支水十四兩浸一月可用陳久不壞聤耳流膿藥先以核桃肉打油滴入棉花捲淨入後藥再滴核桃油二滴龍骨枯礬各三錢黃丹二錢元寸二分各為細末如耳中流血膿者單用龍骨末如上法
